<style>
:root{--saffron:#FF6B35;--saffron-dark:#E5541F;--gold:#F7B731;--green:#20BF6B;--navy:#0D1B2A;--navy-mid:#1A2C42;--navy-soft:#243447;--slate:#8FA3BF;--slate-light:#B8CCDF;--white:#F0F4F8;--card-bg:rgba(26,44,66,0.85);--border:rgba(143,163,191,0.2);}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;overscroll-behavior:none;}
h1,h2,h3,.serif{font-family:'DM Serif Display',serif;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 50% at 20% -10%,rgba(255,107,53,0.15) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 110%,rgba(247,183,49,0.1) 0%,transparent 50%);pointer-events:none;}
#root{position:relative;z-index:1;}
.glass{background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:20px;}
.card{background:var(--navy-mid);border:1px solid var(--border);border-radius:20px;}
.btn-o{background:linear-gradient(135deg,var(--saffron),var(--saffron-dark));color:white;border:none;border-radius:14px;font-weight:700;font-size:15px;padding:14px 28px;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px rgba(255,107,53,0.35);}
.btn-o:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(255,107,53,0.5);}
.btn-o:disabled{opacity:0.45;cursor:not-allowed;transform:none;}
.btn-g{background:rgba(143,163,191,0.12);color:var(--slate-light);border:1px solid var(--border);border-radius:12px;font-weight:600;padding:10px 20px;cursor:pointer;transition:all 0.2s;}
.pin-inp{width:52px;height:52px;border-radius:14px;border:2px solid var(--border);background:rgba(255,255,255,0.05);font-size:22px;text-align:center;color:white;transition:all 0.2s;outline:none;caret-color:var(--saffron);}
.pin-inp:focus{border-color:var(--saffron);background:rgba(255,107,53,0.08);}
.tab-p{padding:8px 16px;border-radius:999px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer;transition:all 0.2s;color:var(--slate);}
.tab-p.on{background:var(--saffron);color:white;box-shadow:0 2px 12px rgba(255,107,53,0.4);}
.flame{animation:flicker 1.2s ease-in-out infinite alternate;display:inline-block;}
@keyframes flicker{0%{transform:scaleY(1) rotate(-1deg);}100%{transform:scaleY(1.05) rotate(1deg);}}
.timer-ring{transition:stroke-dashoffset 1s linear;}
.cv{animation:cvin 0.25s ease;}
@keyframes cvin{from{opacity:0;transform:translateX(18px);}to{opacity:1;transform:translateX(0);}}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,27,42,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:8px 0 env(safe-area-inset-bottom,8px);z-index:50;}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 12px;cursor:pointer;transition:all 0.2s;border-radius:12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--slate);min-width:60px;}
.ni.on{color:var(--saffron);}
.ni .ic{font-size:20px;transition:transform 0.2s;}
.ni.on .ic{transform:scale(1.15);}
.bdg{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:0.05em;}
.qopt{border:1.5px solid var(--border);border-radius:14px;padding:14px 18px;cursor:pointer;background:rgba(255,255,255,0.04);transition:all 0.18s;text-align:left;color:var(--white);font-size:14px;font-weight:500;line-height:1.5;width:100%;}
.qopt:hover:not(:disabled){border-color:var(--saffron);background:rgba(255,107,53,0.08);}
.qopt.ok{border-color:var(--green);background:rgba(32,191,107,0.15);}
.qopt.no{border-color:#EF4444;background:rgba(239,68,68,0.12);}
.pdot{animation:pd 1.4s ease-in-out infinite;}.pdot:nth-child(2){animation-delay:0.2s;}.pdot:nth-child(3){animation-delay:0.4s;}
@keyframes pd{0%,80%,100%{opacity:0.2;transform:scale(0.85);}40%{opacity:1;transform:scale(1);}}
.shim{background:linear-gradient(90deg,rgba(255,255,255,0.03) 25%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.03) 75%);background-size:200% 100%;animation:shm 1.5s infinite;border-radius:8px;}
@keyframes shm{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
.sr{animation:srv 0.5s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes srv{from{transform:scale(0.5);opacity:0;}to{transform:scale(1);opacity:1;}}
.fu{animation:fu 0.4s ease forwards;}
@keyframes fu{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
</style>

  const [user,setUser]=useState(null);
  const [screen,setScreen]=useState("login");
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    const s=localStorage.getItem("guruSess2");
    if(s){try{const u=JSON.parse(s);setUser(u);setScreen("home");}catch(e){}}
    setLoading(false);
  },[]);
  const login=u=>{setUser(u);localStorage.setItem("guruSess2",JSON.stringify(u));setScreen("home");};
  const logout=()=>{setUser(null);localStorage.removeItem("guruSess2");setScreen("login");};

function Login({onLogin}){
  const [mob,setMob]=useState("");
  const [pin,setPin]=useState(["","","",""]);
  const [step,setStep]=useState("mob");
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);
  const refs=[useRef(),useRef(),useRef(),useRef()];
  const next=()=>{if(mob.length!==10){setErr("10 digit daalo");return;}setErr("");setStep("pin");setTimeout(()=>refs[0].current?.focus(),200);};
  const chg=(i,v)=>{if(!/^[0-9]?$/.test(v))return;const n=[...pin];n[i]=v;setPin(n);if(v&&i<3)refs[i+1].current?.focus();};
  const kd=(i,e)=>{if(e.key==="Backspace"&&!pin[i]&&i>0)refs[i-1].current?.focus();if(e.key==="Enter"&&pin.every(d=>d))doLogin();};
  const doLogin=async()=>{
    const ep=pin.join("");if(ep.length!==4){setErr("4-digit PIN daalo");return;}
    setBusy(true);setErr("");
    try{
      const snap=await DB.ref(`${BASE}/users/${mob}`).get();
      if(snap.exists()){const u=snap.val();if(u.pin===hashPIN(ep)){await DB.ref(`${BASE}/users/${mob}/lastActive`).set(todayStr());onLogin({...u,mobile:mob});return;}else{setErr("PIN galat hai.");setBusy(false);return;}}
      const m=TEAM.find(t=>t.mobile===mob);
      if(m){if(ep==="1234"){const ud={...m,pin:hashPIN("1234"),streak:0,lastActive:todayStr(),badges:[],totalScore:0};await DB.ref(`${BASE}/users/${mob}`).set(ud);onLogin({...ud,mobile:mob});}else{setErr("Default PIN: 1234");setBusy(false);}}
      else{setErr("Number registered nahi. Admin se contact karo.");setBusy(false);}
    }catch(e){setErr("Connection error.");setBusy(false);}
  };
  return(
    <div className="min-h-screen flex flex-col items-center justify-center px-6">
      <div className="w-full max-w-sm">
        <div className="text-center mb-8 fu">
          <div className="text-5xl mb-3">🎓</div>
          <div className="serif text-3xl text-white font-bold mb-1">Aldan Guru</div>
          <div className="text-sm" style={{color:"var(--slate)"}}>WomEm Bihar · Field Force Training</div>
        </div>
        <div className="glass p-6 fu" style={{animationDelay:"0.1s"}}>
          {step==="mob"?(<>
            <div className="text-xs font-bold uppercase tracking-widest mb-2" style={{color:"var(--slate)"}}>Mobile Number</div>
            <input type="tel" inputMode="numeric" maxLength={10} value={mob} onChange={e=>setMob(e.target.value.replace(/\D/g,""))} onKeyDown={e=>e.key==="Enter"&&next()} placeholder="10-digit WhatsApp number" autoFocus className="w-full rounded-xl px-4 py-3.5 text-white text-base font-medium focus:outline-none transition mb-4" style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)"}}/>
            {err&&<div className="text-red-400 text-sm mb-3">{err}</div>}
            <button onClick={next} className="btn-o w-full">Continue →</button>
          </>):(<>
            <button onClick={()=>{setStep("mob");setPin(["","","",""]);setErr("");}} className="text-sm mb-3 hover:text-white flex items-center gap-1" style={{color:"var(--slate)"}}>← {mob}</button>
            <div className="text-xs font-bold uppercase tracking-widest mb-4" style={{color:"var(--slate)"}}>4-Digit PIN</div>
            <div className="flex gap-3 justify-center mb-5">{pin.map((d,i)=><input key={i} ref={refs[i]} type="password" inputMode="numeric" maxLength={1} value={d} onChange={e=>chg(i,e.target.value)} onKeyDown={e=>kd(i,e)} className="pin-inp"/>)}</div>
            {err&&<div className="text-red-400 text-sm mb-3 text-center">{err}</div>}
            <button onClick={doLogin} disabled={pin.some(d=>!d)||busy} className="btn-o w-full">{busy?"Checking…":"Login →"}</button>
            <div className="text-center mt-3 text-xs" style={{color:"var(--slate)"}}>Default PIN for new users: 1234</div>
          </>)}

      </div>
    </div>
  );

function Main({user,onLogout}){
  const [tab,setTab]=useState("home");

  const [lb,setLb]=useState([]);
  const [lbLoad,setLbLoad]=useState(true);

  useEffect(()=>{
    DB.ref(`${BASE}/users`).on("value",snap=>{
      const raw=snap.val();if(!raw){setLbLoad(false);return;}
      setLb(Object.entries(raw).map(([m,u])=>({...u,mobile:m})));
      setLbLoad(false);
    });
    return()=>DB.ref(`${BASE}/users`).off();
  },[]);
  const loadQuiz=async()=>{
    setTab("quiz");setQload(true);
    const snap=await DB.ref(`${BASE}/quiz/${user.mobile}/${todayStr()}`).get();
    if(snap.exists()){setQd({...snap.val(),alreadyDone:true});setQload(false);return;}
    const shuffled=[...SQ].sort(()=>Math.random()-0.5);
    setQd({questions:shuffled.slice(0,3).map((q,i)=>({...q,id:i})),answers:[],score:null,alreadyDone:false});
    setQload(false);
  };
  const submitQuiz=async(answers,score)=>{
    const r={questions:qd.questions,answers,score,completedAt:new Date().toISOString()};
    await DB.ref(`${BASE}/quiz/${user.mobile}/${todayStr()}`).set(r);
    const last=user.lastActive;const yd=new Date();yd.setDate(yd.getDate()-1);const yds=yd.toISOString().split("T")[0];
    let ns=last===yds?(user.streak||0)+1:last===todayStr()?user.streak||1:1;
    await DB.ref(`${BASE}/users/${user.mobile}/streak`).set(ns);
    await DB.ref(`${BASE}/users/${user.mobile}/lastActive`).set(todayStr());
    const ts=(user.totalScore||0)+score;

    setStreak(ns);setQd({...r,alreadyDone:true});
  };
  return(
    <div className="min-h-screen pb-24">
      {tab==="home"&&<Home user={user} streak={streak} onStartQuiz={loadQuiz} lb={lb}/>}

            </div>
          ))}
        </div>
      </nav>
    </div>
  );
}

function Quiz({qd,user,onSubmit}){
  const [qi,setQi]=useState(0);const [ans,setAns]=useState([]);const [sel,setSel]=useState(null);const [rev,setRev]=useState(false);
  const [tl,setTl]=useState(90);const [fs,setFs]=useState(null);const [genLoad,setGenLoad]=useState(false);const [aiQ,setAiQ]=useState(null);
  const tmr=useRef();
  useEffect(()=>{if(!qd?.alreadyDone)genAI();},[]);
  const genAI=async()=>{
    setGenLoad(true);
    try{
      const pc=P.map(p=>`${p.name}: ${p.ind}. Composition: ${p.comp.map(c=>c.n).join(", ")}`).join("\n");
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`You are Aldan Guru quiz AI for pharma field force training. User: ${user.name}, Role: ${user.role}, HQ: ${user.hq}\n\nProduct Portfolio:\n${pc}\n\nGenerate exactly 3 MCQ questions in Hinglish. Focus: Ovalux, Lacoria, Myolife Plus (60%), Argilux (20%), others (20%).\n\nReturn ONLY valid JSON array, no markdown:\n[{"product":"name","type":"Composition|Objection Handle|Proof Point|Product Choice|Operational","q":"question","options":["A","B","C","D"],"correct":0,"explanation":"1-2 lines Hinglish"}]`}]})});
      const d=await r.json();const t=d.content?.[0]?.text||"";const parsed=JSON.parse(t.replace(/```json|```/g,"").trim());
      if(Array.isArray(parsed)&&parsed.length===3)setAiQ(parsed.map((q,i)=>({...q,id:i})));
    }catch(e){console.log("AI quiz failed, using static");}
    setGenLoad(false);
  };
  const qs=aiQ||qd?.questions||[];
  useEffect(()=>{
    if(qd?.alreadyDone||fs!==null||qs.length===0)return;
    tmr.current=setInterval(()=>setTl(t=>{
      if(t<=1){clearInterval(tmr.current);const ra=[...ans];for(let i=ans.length;i<3;i++)ra.push(-1);const sc=ra.filter((a,i)=>a===qs[i]?.correct).length;setFs(sc);onSubmit(ra,sc);return 0;}
      return t-1;
    }),1000);
    return()=>clearInterval(tmr.current);
  },[ans.length,qd?.alreadyDone,fs,qs]);
  if(genLoad&&!aiQ)return(<div className="min-h-screen flex flex-col items-center justify-center gap-4 px-4"><div className="text-4xl" style={{animation:"pulse 1s infinite"}}>🧠</div><div className="serif text-xl text-white">AI quiz bana raha hai…</div><div className="flex gap-2 mt-2">{[0,1,2].map(i=><div key={i} className="pdot w-2 h-2 rounded-full bg-orange-400"/>)}</div></div>);
  if(qd?.alreadyDone){const sc=qd.score??0;return(
    <div className="px-4 pt-6 max-w-lg mx-auto">
      <div className="text-center mb-6"><div className="text-5xl mb-3 sr">{sc===3?"🎉":sc>=2?"😊":"💪"}</div><div className="serif text-2xl text-white font-bold">Aaj ka Quiz</div><div className="text-4xl font-black mt-2" style={{color:sc===3?"#20BF6B":sc>=2?"#F7B731":"#FF6B35"}}>{sc}/3</div><div className="text-sm mt-1" style={{color:"var(--slate)"}}>{sc===3?"Zabardast!":sc===2?"Accha — kal 3/3!":"Kal phir aana!"}</div></div>
      <div className="space-y-3">{(qd.questions||[]).map((question,i)=>{const ir=(qd.answers||[])[i]===question.correct;return(<div key={i} className="card p-4" style={{border:`1px solid ${ir?"rgba(32,191,107,0.3)":"rgba(239,68,68,0.3)"}`}}><div className="text-xs mb-2" style={{color:"var(--slate)"}}>{question.type}</div><div className="text-sm text-white mb-2">{question.q}</div><div className={`text-xs font-semibold ${ir?"text-green-400":"text-red-400"}`}>{ir?"✅ Sahi!":` ❌ Sahi tha: "${question.options[question.correct]}"`}</div><div className="text-xs mt-1.5" style={{color:"var(--slate)"}}>{question.explanation}</div></div>);})}</div>
    </div>
  );}
  if(fs!==null)return(
    <div className="px-4 pt-6 max-w-lg mx-auto">
      <div className="text-center mb-6"><div className="text-5xl mb-3 sr">{fs===3?"🎉":fs>=2?"😊":"💪"}</div><div className="serif text-2xl text-white font-bold">Quiz Complete!</div><div className="text-5xl font-black mt-2 sr" style={{color:fs===3?"#20BF6B":fs>=2?"#F7B731":"#FF6B35"}}>{fs}/3</div><div className="text-sm mt-1" style={{color:"var(--slate)"}}>{fs===3?"Perfect! 🌟":fs===2?"Accha — kal 3/3!":"Kal pakke se!"}</div></div>
      <div className="space-y-3">{qs.map((q,i)=>{const ir=ans[i]===q.correct;return(<div key={i} className="card p-4" style={{border:`1px solid ${ir?"rgba(32,191,107,0.3)":"rgba(239,68,68,0.3)"}`}}><div className="text-xs mb-2" style={{color:"var(--slate)"}}>{q.type}</div><div className="text-sm text-white mb-2">{q.q}</div><div className={`text-xs font-semibold ${ir?"text-green-400":"text-red-400"}`}>{ir?"✅ Sahi!":` ❌ Sahi: "${q.options[q.correct]}"`}</div><div className="text-xs mt-1.5" style={{color:"var(--slate)"}}>{q.explanation}</div></div>);})}</div>
    </div>
  );
  const cq=qs[qi];if(!cq)return <Loading msg="Quiz load ho raha hai…"/>;
  const tc=tl/90;const circ=2*Math.PI*22;const tc_color=tl>30?"#20BF6B":tl>10?"#F7B731":"#EF4444";
  const pick=i=>{if(sel!==null)return;setSel(i);setRev(true);const na=[...ans,i];setTimeout(()=>{if(qi<2){setQi(qi+1);setSel(null);setRev(false);}else{clearInterval(tmr.current);const sc=na.filter((a,ii)=>a===qs[ii]?.correct).length;setFs(sc);onSubmit(na,sc);}setAns(na);},1600);};
  const pp=P.find(p=>p.id===cq.product);
  return(
    <div className="px-4 pt-6 max-w-lg mx-auto">
      <div className="flex items-center justify-between mb-6">
        <div><div className="text-xs uppercase tracking-widest font-bold" style={{color:"var(--slate)"}}>Sawaal {qi+1} / 3</div><div className="flex gap-1.5 mt-1.5">{[0,1,2].map(i=><div key={i} className="h-1.5 rounded-full w-8 transition-all" style={{background:i<qi?"#20BF6B":i===qi?"#FF6B35":"rgba(255,255,255,0.1)"}}/>)}</div></div>
        <div className="relative w-14 h-14"><svg className="w-14 h-14" style={{transform:"rotate(-90deg)"}} viewBox="0 0 52 52"><circle cx="26" cy="26" r="22" fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="3"/><circle cx="26" cy="26" r="22" fill="none" stroke={tc_color} strokeWidth="3" strokeDasharray={circ} strokeDashoffset={circ*(1-tc)} className="timer-ring" strokeLinecap="round"/></svg><div className="absolute inset-0 flex items-center justify-center"><span className="text-sm font-black" style={{color:tc_color}}>{tl}</span></div></div>
      </div>
      <div className="mb-3"><span className="bdg" style={{background:`${pp?.color||"#FF6B35"}22`,color:pp?.color||"#FF6B35"}}>{cq.type}</span></div>
      <div className="card p-5 mb-5"><div className="text-white font-semibold text-base leading-relaxed">{cq.q}</div></div>
      <div className="space-y-3">{cq.options.map((opt,i)=>{let cls="qopt";if(rev){if(i===cq.correct)cls+=" ok";else if(i===sel&&i!==cq.correct)cls+=" no";}return(<button key={i} className={cls} onClick={()=>pick(i)} disabled={!!rev}><span className="mr-2 font-bold text-xs" style={{color:"var(--slate)"}}>{String.fromCharCode(65+i)}.</span>{opt}</button>);})}</div>
      {rev&&<div className={`mt-4 p-4 rounded-xl text-sm border fu ${sel===cq.correct?"text-green-200":"text-red-200"}`} style={{background:sel===cq.correct?"rgba(32,191,107,0.1)":"rgba(239,68,68,0.1)",borderColor:sel===cq.correct?"rgba(32,191,107,0.3)":"rgba(239,68,68,0.3)"}}><div className="font-bold mb-1">{sel===cq.correct?"✅ Bilkul sahi!":"❌ Galat jawab"}</div>{cq.explanation}</div>}
    </div>
  );
}

      <div className="space-y-3">{fp.map(p=>(
        <div key={p.id} onClick={()=>setSel(p)} className="card p-4 flex items-center gap-4 cursor-pointer transition-colors" style={{border:"1px solid rgba(255,255,255,0.05)"}}>
          <div className="w-12 h-12 rounded-2xl flex items-center justify-center text-2xl shrink-0" style={{background:`${p.color}22`,border:`1px solid ${p.color}33`}}>{p.em}</div>
          <div className="flex-1 min-w-0"><div className="flex items-center gap-2"><span className="font-bold text-white">{p.name}</span><span className="text-xs" style={{color:p.color}}>{p.pri===3?"★★★":p.pri===2?"★★":"★"}</span></div><div className="text-xs truncate mt-0.5" style={{color:"var(--slate)"}}>{p.ind}</div><div className="text-xs font-semibold mt-1" style={{color:p.color}}>MRP {p.mrp} · PTS {p.pts}</div></div>
          <div className="text-lg" style={{color:"#4a5568"}}>›</div>
        </div>
      ))}</div>
    </div>
  );
}

function PCard({p,onBack}){
  const [v,setV]=useState(0);const tx=useRef(null);
  const views=["At a Glance","Composition","Patient Trigger","Proof Points","Objections"];
  const ts=e=>{tx.current=e.touches[0].clientX;};
  const te=e=>{if(!tx.current)return;const d=tx.current-e.changedTouches[0].clientX;if(Math.abs(d)>50){if(d>0&&v<4)setV(vv=>vv+1);if(d<0&&v>0)setV(vv=>vv-1);}tx.current=null;};
  return(
    <div className="min-h-screen flex flex-col">
      <div className="px-4 pt-6 max-w-lg mx-auto w-full">
        <button onClick={onBack} className="text-sm hover:text-white flex items-center gap-1 mb-4" style={{color:"var(--slate)"}}>← Products</button>
        <div className="flex items-center gap-4 mb-4">
          <div className="w-14 h-14 rounded-2xl flex items-center justify-center text-3xl" style={{background:`${p.color}22`,border:`1px solid ${p.color}44`}}>{p.em}</div>
          <div><h2 className="serif text-xl text-white font-bold">{p.name}</h2><div className="text-xs" style={{color:"var(--slate)"}}>{p.tag}</div><div className="flex gap-2 mt-1"><span className="bdg text-xs" style={{background:`${p.color}22`,color:p.color}}>MRP {p.mrp}</span><span className="bdg text-xs" style={{background:"rgba(255,255,255,0.05)",color:"var(--slate)"}}>PTS {p.pts}</span><span className="bdg text-xs" style={{background:"rgba(255,255,255,0.05)",color:"var(--slate)"}}>{p.pack}</span></div></div>
        </div>
        <div className="flex gap-1.5 mb-4 overflow-x-auto pb-1">{views.map((vn,i)=><button key={i} onClick={()=>setV(i)} className="shrink-0 px-3 py-1.5 rounded-lg text-xs font-bold transition-all" style={v===i?{background:`${p.color}33`,color:p.color}:{color:"var(--slate)"}}>{i+1}. {vn.split(" ")[0]}</button>)}</div>
      </div>
      <div className="flex-1 px-4 max-w-lg mx-auto w-full" onTouchStart={ts} onTouchEnd={te}>
        <div className="cv" key={v}>
          {v===0&&<div className="card p-5"><div className="text-xs font-bold uppercase tracking-widest mb-3" style={{color:"var(--slate)"}}>At a Glance</div><div className="text-2xl font-black mb-1" style={{color:p.color}}>{p.name}</div><div className="serif italic mb-4" style={{color:"#B8CCDF"}}>{p.tag}</div><div className="space-y-3">{[["💊","Indication",p.ind],["📦","Packing",p.pack],["💰","MRP",p.mrp],["📊","PTS",p.pts],["⏱️","Dose",p.dose]].map(([ic,lb,vl])=><div key={lb} className="flex items-start gap-3"><span className="text-base">{ic}</span><div><div className="text-xs font-bold uppercase" style={{color:"var(--slate)"}}>{lb}</div><div className="text-sm text-white mt-0.5">{vl}</div></div></div>)}</div></div>}
          {v===1&&<div className="space-y-3"><div className="text-xs font-bold uppercase tracking-widest mb-1" style={{color:"var(--slate)"}}>Composition</div>{p.comp.map((c,i)=><div key={i} className="card p-4"><div className="font-bold text-sm mb-1.5" style={{color:p.color}}>{c.n}</div><div className="text-sm leading-relaxed" style={{color:"var(--slate-light)"}}>{c.r}</div></div>)}</div>}
          {v===2&&<div className="card p-5"><div className="text-xs font-bold uppercase tracking-widest mb-3" style={{color:"var(--slate)"}}>Patient Trigger</div><div className="text-sm text-white leading-relaxed">{p.trig}</div></div>}
          {v===3&&<div className="space-y-3"><div className="text-xs font-bold uppercase tracking-widest mb-1" style={{color:"var(--slate)"}}>Proof Points</div>{p.proof.map((pr,i)=><div key={i} className="card p-4" style={{borderLeft:`2px solid ${p.color}`}}><div className="text-sm text-white leading-relaxed">📚 {pr}</div></div>)}</div>}
          {v===4&&<div className="space-y-3"><div className="text-xs font-bold uppercase tracking-widest mb-1" style={{color:"var(--slate)"}}>Objection Handles</div>{p.obj.map((o,i)=><div key={i} className="card p-4"><div className="text-xs font-bold mb-2" style={{color:"#F87171"}}>❓ "{o.q}"</div><div className="text-sm text-white leading-relaxed">💬 {o.a}</div></div>)}</div>}
        </div>
        <div className="text-center mt-4 text-xs" style={{color:"#4a5568"}}>← swipe → for next view</div>
      </div>
    </div>
  );
}

function LB({user,lb,loading}){
  const [t,setT]=useState("mbe");
  const mbes=lb.filter(u=>u.role==="mbe").sort((a,b)=>(b.totalScore||0)-(a.totalScore||0));
  const asms=lb.filter(u=>u.role==="asm").sort((a,b)=>(b.totalScore||0)-(a.totalScore||0));
  const list=t==="mbe"?mbes:asms;
  return(
    <div className="px-4 pt-6 max-w-lg mx-auto">
      <div className="mb-5"><h2 className="serif text-xl text-white font-bold mb-1">🏆 Leaderboard</h2><div className="text-sm" style={{color:"var(--slate)"}}>Har roz quiz karo — ranking mein chadhte raho</div></div>
      <div className="flex gap-2 mb-5">{[["mbe","MBE Territory"],["asm","ASM Territory"]].map(([v,l])=><button key={v} onClick={()=>setT(v)} className={`tab-p ${t===v?"on":""}`}>{l}</button>)}</div>
      {loading?<div className="space-y-3">{[0,1,2,3].map(i=><div key={i} className="shim h-16 rounded-xl"/>)}</div>:(
        <>
          {list.slice(0,3).length===3&&<div className="flex items-end justify-center gap-3 mb-6">
            {[1,0,2].map(rank=>{const u=list[rank];if(!u)return null;const hts=["h-24","h-32","h-20"];const rc=["#F7B731","#C0C0C0","#CD7F32"];return(<div key={rank} className="flex flex-col items-center gap-2 flex-1"><div className="text-xl">{["🥇","🥈","🥉"][rank]}</div><div className="text-xs font-bold text-center" style={{color:u.mobile===user.mobile?"#FF6B35":"white"}}>{u.name.split(" ")[0]}</div><div className={`w-full rounded-xl flex items-end justify-center pb-2 ${hts[rank]}`} style={{background:`${rc[rank]}22`,border:`1px solid ${rc[rank]}44`}}><div className="text-sm font-black" style={{color:rc[rank]}}>{u.totalScore||0}</div></div></div>);})}
          </div>}
          <div className="card overflow-hidden">{list.map((u,i)=>(
            <div key={u.mobile} className={`flex items-center gap-3 px-4 py-3.5 ${i<list.length-1?"border-b":""}`} style={{borderColor:"rgba(255,255,255,0.05)",background:u.mobile===user.mobile?"rgba(255,107,53,0.08)":""}}>
              <div className="w-7 text-center font-black text-sm" style={{color:i<3?["#F7B731","#C0C0C0","#CD7F32"][i]:"#4a5568"}}>{i<3?["🥇","🥈","🥉"][i]:`#${i+1}`}</div>
              <div className="flex-1"><div className="font-semibold text-sm" style={{color:u.mobile===user.mobile?"#FF8C5A":"white"}}>{u.name}{u.mobile===user.mobile&&<span className="text-xs ml-1" style={{color:"#FF6B35"}}>(aap)</span>}</div><div className="text-xs" style={{color:"var(--slate)"}}>{u.hq}</div></div>
              <div className="text-right"><div className="text-sm font-black text-white">{u.totalScore||0} pts</div>{(u.streak||0)>0&&<div className="text-xs font-semibold" style={{color:"#FF6B35"}}>🔥 {u.streak}</div>}</div>
              <div className="flex flex-col gap-0.5">{toArr(u.badges).includes("streak7")&&<span title="7 day streak">🔥</span>}</div>
            </div>
          ))}{list.length===0&&<div className="text-center py-10 text-sm" style={{color:"#4a5568"}}>Abhi koi data nahi</div>}</div>
        </>
      )}
    </div>
  );
}

function Profile({user,streak,lb,onLogout}){
  const [hist,setHist]=useState([]);
  useEffect(()=>{DB.ref(`${BASE}/quiz/${user.mobile}`).limitToLast(7).once("value").then(s=>{const r=s.val();if(!r)return;setHist(Object.entries(r).map(([d,dd])=>({date:d,score:dd.score})).reverse());});}, []);
  const badges=toArr(user.badges||[]);
  const rank=lb.filter(u=>u.role==="mbe").sort((a,b)=>(b.totalScore||0)-(a.totalScore||0)).findIndex(u=>u.mobile===user.mobile)+1;
  const bdMap={streak7:{em:"🔥",l:"7-Din Streak",d:"7 din lagatar quiz kiya"},streak30:{em:"🔥🔥",l:"30-Din Streak",d:"30 din — legendary!"}};
  return(
    <div className="px-4 pt-6 max-w-lg mx-auto">
      <div className="text-center mb-6">
        <div className="w-20 h-20 rounded-full mx-auto mb-3 flex items-center justify-center text-3xl font-black text-white" style={{background:"linear-gradient(135deg,#FF6B35,#F7B731)"}}>{user.name.split(" ").map(w=>w[0]).join("").slice(0,2)}</div>
        <div className="serif text-xl text-white font-bold">{user.name}</div>
        <div className="text-sm mt-0.5" style={{color:"var(--slate)"}}>{user.role.toUpperCase()} · {user.hq}</div>
      </div>
      <div className="grid grid-cols-3 gap-3 mb-5">
        <div className="card p-4 text-center"><div className="text-2xl font-black text-white">{user.totalScore||0}</div><div className="text-xs mt-1" style={{color:"var(--slate)"}}>Total Score</div></div>
        <div className="card p-4 text-center"><div className="text-2xl font-black" style={{color:"#FF6B35"}}>🔥{streak}</div><div className="text-xs mt-1" style={{color:"var(--slate)"}}>Streak</div></div>
        <div className="card p-4 text-center"><div className="text-2xl font-black text-white">#{rank||"?"}</div><div className="text-xs mt-1" style={{color:"var(--slate)"}}>Rank</div></div>
      </div>
      {hist.length>0&&<div className="mb-5"><div className="text-xs font-bold uppercase tracking-widest mb-3" style={{color:"#4a5568"}}>Last 7 Days</div>
        <div className="card p-4"><div className="flex items-end gap-2 h-16">{hist.map((e,i)=>{const h=e.score===3?"100%":e.score===2?"66%":e.score===1?"33%":"8%";const c=e.score===3?"#20BF6B":e.score===2?"#F7B731":e.score>=1?"#FF6B35":"#EF4444";return(<div key={i} className="flex-1 flex flex-col items-center gap-1"><div className="w-full rounded-t-lg" style={{height:h,background:c}}/><div className="text-xs" style={{color:"#4a5568"}}>{e.date.slice(5)}</div></div>);})}</div></div>
      </div>}
      <div className="mb-5"><div className="text-xs font-bold uppercase tracking-widest mb-3" style={{color:"#4a5568"}}>Badges {badges.length>0&&`(${badges.length})`}</div>
        <div className="card p-4">{badges.length===0?(<div className="text-center py-4"><div className="text-3xl mb-2">🏅</div><div className="text-sm" style={{color:"var(--slate)"}}>Abhi tak koi badge nahi</div><div className="text-xs mt-1" style={{color:"#4a5568"}}>7 din streak karo — pehla badge pao!</div></div>):<div className="space-y-3">{badges.map(b=>{const bd=bdMap[b]||{em:"🏅",l:b,d:""};return(<div key={b} className="flex items-center gap-3"><div className="text-2xl">{bd.em}</div><div><div className="font-semibold text-white text-sm">{bd.l}</div><div className="text-xs" style={{color:"var(--slate)"}}>{bd.d}</div></div></div>);})}</div>}</div>
      </div>
      <div className="mb-5"><div className="text-xs font-bold uppercase tracking-widest mb-3" style={{color:"#4a5568"}}>Earn karo</div>
        <div className="card p-4 space-y-3">
          {[{em:"🔥",l:"7-Din Streak",t:7,c:streak},{em:"🔥🔥",l:"30-Din Streak",t:30,c:streak},{em:"🌟",l:"Bihar Top Gun",t:1,c:rank===1?1:0}].map((b,i)=>(
            <div key={i}><div className="flex justify-between mb-1"><div className="flex items-center gap-2"><span>{b.em}</span><span className="text-sm text-white font-semibold">{b.l}</span></div><span className="text-xs" style={{color:"var(--slate)"}}>{b.c}/{b.t}</span></div><div className="w-full rounded-full h-1.5" style={{background:"rgba(255,255,255,0.05)"}}><div className="h-1.5 rounded-full transition-all" style={{width:`${Math.min(100,(b.c/b.t)*100)}%`,background:"#FF6B35"}}/></div></div>
          ))}
        </div>
      </div>
      <button onClick={onLogout} className="btn-g w-full mb-8">Logout</button>
    </div>
  );
}

function Loading({msg}){return(<div className="min-h-screen flex flex-col items-center justify-center gap-4 px-4"><div className="flex gap-2">{[0,1,2].map(i=><div key={i} className="pdot w-3 h-3 rounded-full bg-orange-400"/>)}</div><div className="text-sm" style={{color:"var(--slate)"}}>{msg}</div></div>);}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
