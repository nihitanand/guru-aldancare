.flame{animation:flicker 1.2s ease-in-out infinite alternate;display:inline-block;}

.timer-ring{transition:stroke-dashoffset 1s linear;}
.cv{animation:cvin 0.25s ease;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px;}

.ni{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;cursor:pointer;transition:all 0.2s;border-radius:12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--sl);min-width:56px;}
.ni.on{color:var(--o);}
.ni .ic{font-size:19px;transition:transform 0.2s;}
.ni.on .ic{transform:scale(1.15);}
.bdg{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;}

.qopt.no{border-color:#EF4444;background:rgba(239,68,68,0.12);}

.sr{animation:srv 0.5s cubic-bezier(0.34,1.56,0.64,1);}

.lvlup{animation:lvlup 0.8s cubic-bezier(0.34,1.56,0.64,1);}

.beat-dot{width:10px;height:10px;border-radius:50%;}

.beat-dot.skipped{background:#EF4444;}

/* ══ BADGE CHECK ══ */
const checkBadges=async(user,newStreak,quizCount,perfectCount,productsAnswered)=>{
  const badges=toArr(user.badges||[]);
  const toAdd=[];
  if(newStreak>=3&&!badges.includes("streak3"))toAdd.push("streak3");
  if(newStreak>=7&&!badges.includes("streak7"))toAdd.push("streak7");
  if(newStreak>=30&&!badges.includes("streak30"))toAdd.push("streak30");
  if(perfectCount>=1&&!badges.includes("perfect1"))toAdd.push("perfect1");
  if(perfectCount>=3&&!badges.includes("perfect3"))toAdd.push("perfect3");
  if(quizCount>=50&&!badges.includes("quiz50"))toAdd.push("quiz50");
  const lvl=getLevel(user.totalScore||0);
  if(lvl.l>=6&&!badges.includes("gurulevel"))toAdd.push("gurulevel");
  if(productsAnswered&&Object.keys(productsAnswered).length>=11&&!badges.includes("allrounder"))toAdd.push("allrounder");
  if(toAdd.length){
    const updated=[...badges,...toAdd];
    await DB.ref(`${BASE}/users/${user.mobile}/badges`).set(updated);
  }
  return toAdd;
};

function App(){
  const [user,setUser]=useState(null);
  const [screen,setScreen]=useState("login");
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    const s=localStorage.getItem("guruSess_v2");
    if(s){try{const u=JSON.parse(s);setUser(u);setScreen("home");}catch(e){}}
    setLoading(false);
  },[]);
  const login=u=>{setUser(u);localStorage.setItem("guruSess_v2",JSON.stringify(u));setScreen("home");};
  const logout=()=>{setUser(null);localStorage.removeItem("guruSess_v2");setScreen("login");};
  const updateUser=u=>{setUser(u);localStorage.setItem("guruSess_v2",JSON.stringify(u));};
  if(loading)return <Splash/>;
  if(screen==="login")return <Login onLogin={login}/>;
  return <Main user={user} onLogout={logout} updateUser={updateUser}/>;
}

/* ══ MAIN ══ */
function Main({user,onLogout,updateUser}){
  const [tab,setTab]=useState("home");
  const [qd,setQd]=useState(null);const [qload,setQload]=useState(false);
  const [lb,setLb]=useState([]);const [lbLoad,setLbLoad]=useState(true);
  const [streak,setStreak]=useState(user.streak||0);
  const [lvlUp,setLvlUp]=useState(null);
  const [myDocs,setMyDocs]=useState({});const [docsLoad,setDocsLoad]=useState(true);
  const [tpData,setTpData]=useState({});
  const [weakProds,setWeakProds]=useState([]);

  useEffect(()=>{
    DB.ref(`${BASE}/users`).on("value",snap=>{
      const raw=snap.val();if(!raw){setLbLoad(false);return;}
      setLb(Object.entries(raw).map(([m,u])=>({...u,mobile:m})));
      setLbLoad(false);
    });
    // Load my doctors
    const docMob=(user.role==="mbe")?user.mobile:null;
    if(docMob){
      DB.ref(`${BASE}/doctors/${docMob}`).once("value").then(s=>{
        setMyDocs(toObj(s.val()));setDocsLoad(false);
      });
    }else{
      // ASM/RSM/ZSM/admin — load all doctors under their territory
      setDocsLoad(false);
    }
    // Load TP
    DB.ref(`${BASE}/tp/2026-05/${user.mobile}`).once("value").then(s=>{
      setTpData(toObj(s.val()));
    });
    // Weak products
    const wp=WEAK_PRODUCTS[user.mobile]||[];
    setWeakProds(wp);
    return()=>DB.ref(`${BASE}/users`).off();
  },[]);

  const loadQuiz=async()=>{
    setTab("quiz");setQload(true);
    const snap=await DB.ref(`${BASE}/quiz/${user.mobile}/${todayStr()}`).get();
    if(snap.exists()){setQd({...snap.val(),alreadyDone:true});setQload(false);return;}
    // Pick questions weighted by weak products
    const weak=weakProds.map(w=>PROD_RX_KEY[w]).filter(Boolean);
    let pool=[...SQ];
    // Boost weak product questions
    weak.forEach(pid=>{
      const boost=SQ.filter(q=>q.product===pid);
      pool=[...pool,...boost];// soft nudge
    });
    const shuffled=pool.sort(()=>Math.random()-0.5);
    // Deduplicate by question text, take 3
    const seen=new Set();const q3=[];
    for(const q of shuffled){if(!seen.has(q.q)&&q3.length<3){seen.add(q.q);q3.push({...q,id:q3.length});}}
    setQd({questions:q3,answers:[],score:null,alreadyDone:false});
    setQload(false);
  };

  const submitQuiz=async(answers,score)=>{
    const r={questions:qd.questions,answers,score,completedAt:new Date().toISOString()};
    await DB.ref(`${BASE}/quiz/${user.mobile}/${todayStr()}`).set(r);
    // Streak
    const last=user.lastActive;const yd=new Date();yd.setDate(yd.getDate()-1);const yds=yd.toISOString().split("T")[0];
    const ns=last===yds?(user.streak||0)+1:last===todayStr()?user.streak||1:1;
    await DB.ref(`${BASE}/users/${user.mobile}/streak`).set(ns);
    await DB.ref(`${BASE}/users/${user.mobile}/lastActive`).set(todayStr());
    // Points
    const pts_earned=score*PTS.quiz_correct+(score===3?PTS.quiz_perfect:0)+(ns===7?PTS.streak7bonus:0);
    await addPoints(user.mobile,pts_earned,"quiz");
    // Level check
    const newTotal=(user.totalScore||0)+pts_earned;
    const oldLvl=getLevel(user.totalScore||0);const newLvl=getLevel(newTotal);
    if(newLvl.l>oldLvl.l)setLvlUp(newLvl);
    // Badges
    const quizSnap=await DB.ref(`${BASE}/quiz/${user.mobile}`).once("value");
    const quizCount=Object.keys(toObj(quizSnap.val())).length;
    const perfSnap=await DB.ref(`${BASE}/users/${user.mobile}/perfectCount`).get();
    const perfCount=(perfSnap.val()||0)+(score===3?1:0);
    if(score===3)await DB.ref(`${BASE}/users/${user.mobile}/perfectCount`).set(perfCount);
    await checkBadges({...user,totalScore:newTotal},ns,quizCount,perfCount,null);
    // WA queue
    queueWA(user.mobile,"guru_quiz_result",[`${score}/3`,`${ns}`,`?`,getLevel(newTotal).name]);
    setStreak(ns);
    const updUser={...user,totalScore:newTotal,streak:ns,lastActive:todayStr()};
    updateUser(updUser);
    setQd({...r,alreadyDone:true});
  };

  return(
    <div className="min-h-screen pb-24">
      {lvlUp&&<LevelUpOverlay lvl={lvlUp} onClose={()=>setLvlUp(null)}/>}
      {tab==="home"&&<Home user={user} streak={streak} onStartQuiz={loadQuiz} lb={lb} tpData={tpData}/>}
      {tab==="quiz"&&(qload?<Loading msg="Quiz load ho raha hai…"/>:<Quiz qd={qd} user={user} onSubmit={submitQuiz} weakProds={weakProds}/>)}
      {tab==="today"&&<Today user={user} myDocs={myDocs} tpData={tpData} docsLoad={docsLoad}/>}
      {tab==="products"&&<Products user={user}/>}
      {tab==="leaderboard"&&<LB user={user} lb={lb} loading={lbLoad}/>}
      {tab==="profile"&&<Profile user={user} streak={streak} lb={lb} onLogout={onLogout}/>}
      {tab==="practice"&&<PracticeMode user={user} weakProds={weakProds}/>}
      {tab==="dost"&&<AldanDost user={user} weakProds={weakProds}/>}
      {tab==="admin"&&user.role==="admin"&&<AdminPanel user={user} lb={lb}/>}
      <nav className="bnav">
        <div className="flex justify-around items-center">
          {[
            {id:"home",ic:"🏠",l:"Home"},
            {id:"today",ic:"📋",l:"Today"},
            {id:"quiz",ic:"🧠",l:"Quiz",act:loadQuiz},
            {id:"practice",ic:"🎯",l:"Practice"},
            {id:"dost",ic:"🤝",l:"Dost"},
            {id:"products",ic:"💊",l:"Products"},
            {id:"leaderboard",ic:"🏆",l:"Ranks"},
            {id:"profile",ic:"👤",l:"Profile"},
            ...(user.role==="admin"?[{id:"admin",ic:"⚙️",l:"Admin"}]:[])
          ].map(n=>(
            <div key={n.id} className={`ni ${tab===n.id?"on":""}`} onClick={()=>n.act?n.act():setTab(n.id)}>
              <span className="ic">{n.ic}</span><span>{n.l}</span>
            </div>
          ))}
        </div>
      </nav>
    </div>
  );
}

/* ══ QUIZ ══ */
function Quiz({qd,user,onSubmit,weakProds}){
  const [qi,setQi]=useState(0);const [ans,setAns]=useState([]);const [sel,setSel]=useState(null);const [rev,setRev]=useState(false);
  const [tl,setTl]=useState(90);const [fs,setFs]=useState(null);const [aiQ,setAiQ]=useState(null);const [genLoad,setGenLoad]=useState(false);
  const tmr=useRef();
  useEffect(()=>{if(!qd?.alreadyDone)genAI();},[]);
  const genAI=async()=>{
    setGenLoad(true);
    try{
      const weak=weakProds.map(w=>{const p=P.find(pp=>PROD_RX_KEY[w]===pp.id);return p?`${p.name} (weak in territory)`:w;}).join(", ");
      const prodContext=P.map(p=>`${p.name}: ${p.ind}. Composition: ${p.comp.map(c=>c.n).join(", ")}. Journal: ${p.journal}. MRP: ${p.mrp}. Dose: ${p.dose}`).join("\n");
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,messages:[{role:"user",content:`You are Aldan Guru, pharma training AI for Aldan Healthcare WomEm Bihar field force.\n\nUser: ${user.name}, Role: ${user.role.toUpperCase()}, HQ: ${user.hq}\nWeak products in territory: ${weak||"none identified"}\n\nFull Product Portfolio:\n${prodContext}\n\nGenerate exactly 3 MCQ questions in Hinglish. Mix all 8 categories: Composition, MRP & Packing, Mechanism, Journal Reference, Catch Line, Doctor Insight, Objection Handle, Product Choice. Weight weak products 60%. Make doctor-level insights where possible — e.g. reference that a specific product is weak in their territory.\n\nReturn ONLY valid JSON array, no markdown:\n[{"cat":"Category","product":"id","q":"question","options":["A","B","C","D"],"correct":0,"explanation":"1-2 lines Hinglish"}]`}]})});
      const data=await res.json();const t=data.content?.[0]?.text||"";
      const parsed=JSON.parse(t.replace(/```json|```/g,"").trim());
      if(Array.isArray(parsed)&&parsed.length===3)setAiQ(parsed.map((q,i)=>({...q,id:i})));
    }catch(e){console.log("AI fallback to static");}
    setGenLoad(false);
  };
  const qs=aiQ||qd?.questions||[];
  useEffect(()=>{
    if(qd?.alreadyDone||fs!==null||qs.length===0)return;
    tmr.current=setInterval(()=>setTl(t=>{
      if(t<=1){clearInterval(tmr.current);const ra=[...ans];for(let i=ans.length;i<3;i++)ra.push(-1);const sc=ra.filter((a,ii)=>a===qs[ii]?.correct).length;setFs(sc);onSubmit(ra,sc);return 0;}
      return t-1;
    }),1000);
    return()=>clearInterval(tmr.current);
  },[ans.length,qd?.alreadyDone,fs,qs]);

  if(genLoad&&!aiQ)return(<div className="min-h-screen flex flex-col items-center justify-center gap-4 px-4"><div className="text-4xl" style={{animation:"pulse 1s infinite"}}>🧠</div><div className="serif text-xl text-white">AI quiz bana raha hai…</div><div className="text-sm mb-2" style={{color:"var(--sl)"}}>Aapke territory data ke hisaab se</div><div className="flex gap-2">{[0,1,2].map(i=><div key={i} className="pdot w-2 h-2 rounded-full" style={{background:"var(--o)"}}/>)}</div></div>);

  const ReviewList=({questions,answers,score})=>(
    <div className="px-4 pt-6 max-w-lg mx-auto">
      <div className="text-center mb-6">
        <div className="text-5xl mb-3 sr">{score===3?"🎉":score>=2?"😊":"💪"}</div>
        <div className="serif text-2xl text-white font-bold">{score===3?"Quiz Complete!":"Quiz Done"}</div>
        <div className="text-5xl font-black mt-2 sr" style={{color:score===3?"#20BF6B":score>=2?"#F7B731":"#FF6B35"}}>{score}/3</div>
        <div className="text-sm mt-2" style={{color:"var(--sl)"}}>{score===3?"Perfect! Aap expert hain 🌟":score===2?"Accha — kal 3/3 ka try!":"Kal phir pakke se aana!"}</div>
        <div className="mt-2 text-xs font-bold" style={{color:"var(--o)"}}>+{score*PTS.quiz_correct+(score===3?PTS.quiz_perfect:0)} pts earned</div>
      </div>
      <div className="space-y-3">{questions.map((q,i)=>{const ir=answers[i]===q.correct;return(<div key={i} className="card p-4" style={{border:`1px solid ${ir?"rgba(32,191,107,0.3)":"rgba(239,68,68,0.3)"}`}}><div className="flex items-center gap-2 mb-2"><span className="bdg text-xs" style={{background:"rgba(255,255,255,0.05)",color:"var(--sl)"}}>{q.cat}</span></div><div className="text-sm text-white mb-2">{q.q}</div><div className={`text-xs font-semibold ${ir?"text-green-400":"text-red-400"}`}>{ir?"✅ Sahi!":` ❌ Sahi: "${q.options[q.correct]}"`}</div><div className="text-xs mt-1.5" style={{color:"var(--sl)"}}>{q.explanation}</div></div>);})}
      </div>
    </div>
  );

  if(qd?.alreadyDone)return <ReviewList questions={qd.questions||[]} answers={qd.answers||[]} score={qd.score??0}/>;
  if(fs!==null)return <ReviewList questions={qs} answers={ans} score={fs}/>;

  const cq=qs[qi];if(!cq)return <Loading msg="Quiz load ho raha hai…"/>;
  const tc=tl/90;const circ=2*Math.PI*22;const tcol=tl>30?"#20BF6B":tl>10?"#F7B731":"#EF4444";
  const pp=P.find(p=>p.id===cq.product);
  const pick=i=>{if(sel!==null)return;setSel(i);setRev(true);const na=[...ans,i];setTimeout(()=>{if(qi<2){setQi(qi+1);setSel(null);setRev(false);}else{clearInterval(tmr.current);const sc=na.filter((a,ii)=>a===qs[ii]?.correct).length;setFs(sc);onSubmit(na,sc);}setAns(na);},1800);};

  return(
    <div className="px-4 pt-6 max-w-lg mx-auto">
      <div className="flex items-center justify-between mb-5">
        <div>
          <div className="text-xs uppercase tracking-widest font-bold" style={{color:"var(--sl)"}}>Sawaal {qi+1} / 3</div>
          <div className="flex gap-1.5 mt-2">{[0,1,2].map(i=><div key={i} className="h-1.5 rounded-full w-8 transition-all" style={{background:i<qi?"#20BF6B":i===qi?"#FF6B35":"rgba(255,255,255,0.1)"}}/>)}</div>
        </div>
        <div className="relative w-14 h-14">

/* ══ TODAY'S BEAT ══ */
function Today({user,myDocs,tpData,docsLoad}){
  const [phase,setPhase]=useState("morning");// morning | beat | prep | log | summary
  const [visitLog,setVisitLog]=useState({});
  const [selDoc,setSelDoc]=useState(null);
  const [confirmed,setConfirmed]=useState(false);
  const [beatDocs,setBeatDocs]=useState([]);
  const [devNote,setDevNote]=useState("");
  const [saving,setSaving]=useState(false);

  // Get today's TP
  const todayKey=new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"2-digit",year:"numeric"}).split("/").join("-").replace(/(\d{2})-(\d{2})-(\d{4})/,"$1-$2-$3");
  // Format as DD-MM-YYYY
  const d=new Date();const dd=String(d.getDate()).padStart(2,"0");const mm=String(d.getMonth()+1).padStart(2,"0");const yyyy=d.getFullYear();
  const todayFmt=`${dd}-${mm}-${yyyy}`;
  const todayTP=tpData[todayFmt]||null;

  // Load today's beat log if exists
  useEffect(()=>{
    DB.ref(`${BASE}/beat_log/${todayStr()}/${user.mobile}`).once("value").then(s=>{
      const raw=s.val();
      if(raw){setVisitLog(toObj(raw.visits||{}));setConfirmed(true);setPhase("beat");}
    });
  },[]);

  // My doctors as array
  const myDocArr=Object.values(myDocs);

  // Get weak products for a doctor
  const getDocWeakProds=(doc)=>{
    const rx=toObj(doc.rx||{});
    const products=P.map(p=>({p,qty:rx[Object.keys(PROD_RX_KEY).find(k=>PROD_RX_KEY[k]===p.id)]||0}));
    return products.filter(x=>x.qty===0).slice(0,3).map(x=>x.p);
  };

  const confirmBeat=async(modified=false)=>{
    setSaving(true);
    const docs=beatDocs.length>0?beatDocs:myDocArr.slice(0,todayTP?.docCount||10);
    const logData={confirmedAt:new Date().toISOString(),tp:todayTP,modified,devNote,visits:{}};
    await DB.ref(`${BASE}/beat_log/${todayStr()}/${user.mobile}`).set(logData);
    if(modified&&devNote)await DB.ref(`${BASE}/deviations/${todayStr()}/${user.mobile}`).set({note:devNote,ts:new Date().toISOString()});
    setSaving(false);setConfirmed(true);setPhase("beat");
  };

  const markVisit=async(docCode,status,products=[])=>{
    const updated={...visitLog,[docCode]:{status,products,ts:new Date().toISOString()}};
    setVisitLog(updated);
    await DB.ref(`${BASE}/beat_log/${todayStr()}/${user.mobile}/visits/${docCode}`).set({status,products,ts:new Date().toISOString()});
    // Points for visit
    if(status==="visited")await addPoints(user.mobile,PTS.beat_visit,"beat_visit");
    if(products.length>0)await addPoints(user.mobile,PTS.doc_discussion,"doc_discussion");
  };

  const visitedCount=Object.values(visitLog).filter(v=>v.status==="visited").length;
  const totalPlanned=Object.keys(visitLog).length||todayTP?.docCount||myDocArr.length;

  if(!todayTP||todayTP.activity!=="Field"){return(
    <div className="px-4 pt-6 max-w-lg mx-auto text-center py-16">
      <div className="text-4xl mb-4">📅</div>
      <div className="serif text-xl text-white font-bold mb-2">Aaj Field Nahi</div>
      <div className="text-sm" style={{color:"var(--sl)"}}>{todayTP?`Activity: ${todayTP.activity}`:"TP data available nahi hai aaj ke liye"}</div>
    </div>
  );}

  // MORNING CONFIRM phase
  if(phase==="morning"&&!confirmed){return(
    <div className="px-4 pt-6 max-w-lg mx-auto">
      <h2 className="serif text-xl text-white font-bold mb-1">📋 Aaj ka Beat</h2>
      <div className="text-sm mb-5" style={{color:"var(--sl)"}}>Apna aaj ka plan confirm karo</div>
      <div className="card p-5 mb-4">
        <div className="space-y-3">
          <Row2 ic="📍" lb="Beat / Patch" vl={todayTP.beat||"—"}/>
          <Row2 ic="🏙️" lb="Work Area" vl={todayTP.area||"—"}/>
          <Row2 ic="📊" lb="Category" vl={todayTP.workCat||"—"}/>
          <Row2 ic="👩‍⚕️" lb="Doctors Planned" vl={`${todayTP.docCount||"?"} doctors`}/>
        </div>
      </div>
      <div className="card p-4 mb-4">
        <div className="text-xs font-bold uppercase tracking-widest mb-2" style={{color:"var(--sl)"}}>Koi badlaav hai plan mein?</div>
        <textarea value={devNote} onChange={e=>setDevNote(e.target.value)} placeholder="Optional — agar koi change hai to yahan likho (deviation record hoga)" rows={2} className="w-full rounded-xl px-3 py-2 text-sm text-white focus:outline-none resize-none" style={{background:"rgba(255,255,255,0.05)",border:"1px solid var(--bd)"}}/>
      </div>
      <div className="flex gap-3">
        <button onClick={()=>confirmBeat(false)} disabled={saving} className="btn-o flex-1">✅ Haan, Yahi Plan Hai</button>
        <button onClick={()=>confirmBeat(true)} disabled={saving} className="btn-g flex-1">{saving?"Saving…":"Badlaav Ke Saath"}</button>
      </div>
    </div>
  );}

  // BEAT DASHBOARD
  if(selDoc){
    const doc=selDoc;const weakP=getDocWeakProds(doc);const rx=toObj(doc.rx||{});
    const rxProds=Object.entries(rx).filter(([k,v])=>v>0).sort((a,b)=>b[1]-a[1]);
    const vl=visitLog[doc.code];
    return(
      <div className="px-4 pt-6 max-w-lg mx-auto">
        <button onClick={()=>setSelDoc(null)} className="text-sm mb-4 flex items-center gap-1 hover:text-white" style={{color:"var(--sl)"}}>← Beat List</button>
        <div className="flex items-start gap-3 mb-5">
          <div className="w-12 h-12 rounded-xl flex items-center justify-center text-xl shrink-0 font-black text-white" style={{background:"linear-gradient(135deg,var(--o),#F7B731)"}}>{doc.name[0]}</div>
          <div>
            <div className="font-black text-white">{doc.name}</div>
            <div className="text-xs mt-0.5" style={{color:"var(--sl)"}}>{doc.spec} · {doc.cat} · {doc.qual||"—"}</div>
            {doc.hosp&&<div className="text-xs" style={{color:"#4a5568"}}>{doc.hosp}</div>}
          </div>
        </div>
        {/* Rx History */}
        <div className="card p-4 mb-4">
          <div className="text-xs font-bold uppercase tracking-widest mb-3" style={{color:"var(--sl)"}}>📈 Rx History (Jan 2024 – Feb 2026)</div>
          {rxProds.length>0?(
            <div className="space-y-2">{rxProds.map(([prod,qty])=>{const pid=PROD_RX_KEY[prod];const pp=P.find(x=>x.id===pid);return(<div key={prod} className="flex items-center justify-between"><div className="flex items-center gap-2"><span>{pp?.em||"💊"}</span><span className="text-sm text-white">{pp?.name||prod}</span></div><div className="flex items-center gap-2"><div className="rounded-full px-2 py-0.5 text-xs font-bold" style={{background:`${pp?.color||"#FF6B35"}22`,color:pp?.color||"#FF6B35"}}>{qty} units</div></div></div>);})}
            </div>
          ):<div className="text-sm" style={{color:"var(--sl)"}}>Koi Rx history nahi — new doctor</div>}
        </div>
        {/* Weak products / opportunity */}
        {weakP.length>0&&<div className="card p-4 mb-4" style={{border:"1px solid rgba(255,107,53,0.3)"}}>
          <div className="text-xs font-bold uppercase tracking-widest mb-2" style={{color:"var(--o)"}}>🎯 Opportunity — Products Not Yet Prescribed</div>
          {weakP.slice(0,3).map(pp=>(
            <div key={pp.id} className="flex items-start gap-3 mb-3 last:mb-0">
              <span className="text-xl">{pp.em}</span>
              <div><div className="font-semibold text-white text-sm">{pp.name}</div>
              <div className="text-xs mt-0.5" style={{color:"var(--sl)"}}>{pp.catch}</div></div>
            </div>
          ))}
        </div>}
        {/* Log visit */}
        <div className="card p-4">
          <div className="text-xs font-bold uppercase tracking-widest mb-3" style={{color:"var(--sl)"}}>Visit Log</div>
          {vl?(
            <div className={`text-sm font-bold ${vl.status==="visited"?"text-green-400":"text-red-400"}`}>
              {vl.status==="visited"?`✅ Visited`:`❌ ${vl.status}`}
              {vl.products?.length>0&&<span className="ml-2 text-xs text-white">· Discussed: {vl.products.join(", ")}</span>}
            </div>
          ):(
            <div>
              <div className="text-xs mb-2" style={{color:"var(--sl)"}}>Kya products discuss kiye? (select all)</div>
              <DiscussSelect doc={doc} onLog={(prods)=>markVisit(doc.code,"visited",prods)}/>
              <button onClick={()=>markVisit(doc.code,"not_visited",[])} className="btn-g w-full mt-2 text-sm">❌ Visit Nahi Hua</button>
            </div>
          )}
        </div>
      </div>
    );
  }

  // BEAT LIST
  const displayDocs=myDocArr.slice(0,30);
  return(
    <div className="px-4 pt-6 max-w-lg mx-auto">
      <div className="flex items-center justify-between mb-5">
        <div>
          <h2 className="serif text-xl text-white font-bold">📋 Today's Beat</h2>
          <div className="text-sm mt-0.5" style={{color:"var(--sl)"}}>{todayTP.beat||todayTP.area} · {visitedCount}/{totalPlanned} visited</div>
        </div>
        <div className="text-right">
          <div className="text-2xl font-black" style={{color:visitedCount===totalPlanned?"#20BF6B":"var(--o)"}}>{Math.round(visitedCount/Math.max(totalPlanned,1)*100)}%</div>
          <div className="text-xs" style={{color:"var(--sl)"}}>Coverage</div>
        </div>
      </div>
      {/* Progress bar */}
      <div className="w-full rounded-full h-2 mb-5" style={{background:"rgba(255,255,255,0.08)"}}>
        <div className="h-2 rounded-full transition-all" style={{width:`${Math.round(visitedCount/Math.max(totalPlanned,1)*100)}%`,background:"linear-gradient(90deg,var(--o),#20BF6B)"}}/>
      </div>
      {docsLoad?<div className="space-y-2">{[0,1,2,3,4].map(i=><div key={i} className="shim h-14 rounded-xl"/>)}</div>:(
        <div className="space-y-2">
          {displayDocs.map(doc=>{
            const vl=visitLog[doc.code];
            const weakP=getDocWeakProds(doc);
            return(
              <div key={doc.code} onClick={()=>setSelDoc(doc)} className="card px-4 py-3 flex items-center gap-3 cursor-pointer" style={{borderLeft:`3px solid ${vl?.status==="visited"?"#20BF6B":vl?"#EF4444":doc.cat==="CORE"?"var(--o)":"var(--bd)"}`}}>
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-white text-sm truncate">{doc.name}</div>
                  <div className="text-xs" style={{color:"var(--sl)"}}>{doc.spec} · <span style={{color:doc.cat==="CORE"?"var(--o)":"var(--sl)"}}>{doc.cat}</span></div>
                  {weakP.length>0&&!vl&&<div className="text-xs mt-0.5" style={{color:"#F7B731"}}>🎯 {weakP[0]?.name} — opportunity</div>}
                </div>
                <div className="shrink-0 text-right">
                  {vl?.status==="visited"?<span className="text-green-400 text-lg">✅</span>:vl?<span className="text-red-400 text-lg">❌</span>:<span style={{color:"#4a5568"}}>›</span>}
                </div>
              </div>
            );
          })}
        </div>
      )}
      {displayDocs.length===0&&<div className="text-center py-12" style={{color:"var(--sl)"}}>Doctor list load ho rahi hai…</div>}
    </div>
  );
}

    <div>
      <div className="flex flex-wrap gap-2 mb-3">{P.filter(p=>p.pri>=2).map(pp=>(

/* ══ PRODUCTS ══ */
function Products({user}){
  const [sel,setSel]=useState(null);const [flt,setFlt]=useState("all");
  const [viewed,setViewed]=useState(new Set());
  const fp=flt==="all"?P:flt==="core"?P.filter(p=>p.pri===3):flt==="focus"?P.filter(p=>p.pri===2):P.filter(p=>p.pri===1);
  const openCard=async(p)=>{
    setSel(p);
    if(!viewed.has(p.id)){
      setViewed(v=>new Set([...v,p.id]));
      await addPoints(user.mobile,PTS.card_view,"card_view");
      // Badge: scholar if all 11 viewed
      if(viewed.size+1>=11){
        const snap=await DB.ref(`${BASE}/users/${user.mobile}/badges`).get();

      <div className="flex gap-2 mb-5 overflow-x-auto pb-1">{[["all","Sabhi"],["core","★★★ Core"],["focus","★★ Focus"],["support","★ Support"]].map(([v,l])=><button key={v} onClick={()=>setFlt(v)} className={`tab-p shrink-0 ${flt===v?"on":""}`}>{l}</button>)}</div>
      <div className="space-y-3">{fp.map(p=>(
        <div key={p.id} onClick={()=>openCard(p)} className="card p-4 flex items-center gap-4 cursor-pointer" style={{border:"1px solid rgba(255,255,255,0.05)"}}>

            <div className="text-xs truncate mt-0.5" style={{color:"var(--sl)"}}>{p.ind}</div>
            <div className="text-xs font-semibold mt-0.5" style={{color:p.color}}>MRP {p.mrp} · PTS {p.ptv}</div>
          </div>

        </div>

function PCard({p,onBack}){
  const [v,setV]=useState(0);const tx=useRef(null);

  const ts=e=>{tx.current=e.touches[0].clientX;};
  const te=e=>{if(!tx.current)return;const d=tx.current-e.changedTouches[0].clientX;if(Math.abs(d)>50){if(d>0&&v<4)setV(vv=>vv+1);if(d<0&&v>0)setV(vv=>vv-1);}tx.current=null;};
  return(
    <div className="min-h-screen flex flex-col">
      <div className="px-4 pt-6 max-w-lg mx-auto w-full">
        <button onClick={onBack} className="text-sm hover:text-white flex items-center gap-1 mb-4" style={{color:"var(--sl)"}}>← Products</button>
        <div className="flex items-center gap-4 mb-4">
          <div className="w-14 h-14 rounded-2xl flex items-center justify-center text-3xl" style={{background:`${p.color}22`,border:`1px solid ${p.color}44`}}>{p.em}</div>
          <div><h2 className="serif text-xl text-white font-bold">{p.name}</h2><div className="text-xs" style={{color:"var(--sl)"}}>{p.tag}</div>
          <div className="flex gap-2 mt-1">
            <span className="bdg text-xs" style={{background:`${p.color}22`,color:p.color}}>MRP {p.mrp}</span>
            <span className="bdg text-xs" style={{background:"rgba(255,255,255,0.05)",color:"var(--sl)"}}>PTS {p.ptv}</span>
            <span className="bdg text-xs" style={{background:"rgba(255,255,255,0.05)",color:"var(--sl)"}}>{p.pack}</span>
          </div></div>
        </div>
        <div className="flex gap-1.5 mb-4 overflow-x-auto pb-1">{views.map((vn,i)=><button key={i} onClick={()=>setV(i)} className="shrink-0 px-3 py-1.5 rounded-lg text-xs font-bold transition-all" style={v===i?{background:`${p.color}33`,color:p.color}:{color:"var(--sl)"}}>{i+1}. {vn.split(" ")[0]}</button>)}</div>
      </div>
      <div className="flex-1 px-4 max-w-lg mx-auto w-full" onTouchStart={ts} onTouchEnd={te}>
        <div className="cv" key={v}>
          {v===0&&<div className="card p-5">
            <div className="text-2xl font-black mb-1" style={{color:p.color}}>{p.name}</div>
            <div className="serif italic mb-4" style={{color:"#B8CCDF"}}>{p.tag}</div>
            <div className="space-y-3">
              {[["💊","Indication",p.ind],["📦","Packing",p.pack],["💰","MRP",p.mrp],["📊","PTS",p.ptv],["⏱️","Dose",p.dose],["📚","Key Journal",p.journal],["💬","Catch Line",p.catch]].map(([ic,lb,vl])=>(
                <div key={lb} className="flex items-start gap-3"><span className="text-base">{ic}</span><div><div className="text-xs font-bold uppercase" style={{color:"var(--sl)"}}>{lb}</div><div className="text-sm text-white mt-0.5">{vl}</div></div></div>
              ))}
            </div>
          </div>}
          {v===1&&<div className="space-y-3">{p.comp.map((c,i)=><div key={i} className="card p-4"><div className="font-bold text-sm mb-1.5" style={{color:p.color}}>{c.n}</div><div className="text-sm leading-relaxed" style={{color:"var(--sll)"}}>{c.r}</div></div>)}</div>}
          {v===2&&<div className="card p-5"><div className="text-xs font-bold uppercase tracking-widest mb-3" style={{color:"var(--sl)"}}>Patient Trigger</div><div className="text-sm text-white leading-relaxed">{p.trig}</div></div>}
          {v===3&&<div className="space-y-3">{p.proof.map((pr,i)=><div key={i} className="card p-4" style={{borderLeft:`2px solid ${p.color}`}}><div className="text-sm text-white leading-relaxed">📚 {pr}</div></div>)}</div>}
          {v===4&&<div className="space-y-3">{p.obj.map((o,i)=><div key={i} className="card p-4"><div className="text-xs font-bold mb-2" style={{color:"#F87171"}}>❓ "{o.q}"</div><div className="text-sm text-white leading-relaxed">💬 {o.a}</div></div>)}</div>}
        </div>
        <div className="text-center mt-4 text-xs" style={{color:"#4a5568"}}>← swipe → next view</div>
      </div>
    </div>
  );

/* ══ LEADERBOARD ══ */

  return(
    <div className="px-4 pt-6 max-w-lg mx-auto">
      <div className="mb-5"><h2 className="serif text-xl text-white font-bold mb-1">🏆 Leaderboard</h2><div className="text-sm" style={{color:"var(--sl)"}}>Har roz quiz karo — ranking mein chadhte raho</div></div>
      <div className="flex gap-2 mb-5 overflow-x-auto pb-1">{[["mbe","MBE Territory"],["asm","ASM Territory"],["mgr","Managers"]].map(([v,l])=><button key={v} onClick={()=>setT(v)} className={`tab-p shrink-0 ${t===v?"on":""}`}>{l}</button>)}</div>

    setLoading(true);
    try{
      const weak=weakProds.map(w=>{const p=P.find(pp=>PROD_RX_KEY[w]===pp.id);return p?p.name:w;}).join(", ")||"none";
      let prompt="";
      const prodContext=P.map(p=>`${p.name}: ${p.ind}. Composition: ${p.comp.map(c=>c.n).join(", ")}. MRP: ${p.mrp}. PTS: ${p.ptv}. Dose: ${p.dose}. Journal: ${p.journal}. Catch: ${p.catch}`).join("\n");

      if(type==="product"){
        const pp=P.find(x=>x.id===target);
        prompt=`You are Aldan Guru adaptive quiz AI for ${user.name} (${user.role}, ${user.hq}).\n\nProduct focus: ${pp?.name}\nFull details: ${JSON.stringify(pp)}\nUser weak products in territory: ${weak}\n\nGenerate 5 MCQ questions ONLY about ${pp?.name}. Cover: composition, mechanism, MRP/dose, journal evidence, objection handling, catch line, clinical scenarios. Start MEDIUM difficulty. Vary question types.\n\nReturn ONLY valid JSON array:\n[{"cat":"type","q":"question in Hinglish","options":["A","B","C","D"],"correct":0,"explanation":"1-2 lines Hinglish","difficulty":"easy|medium|hard"}]`;
      }else if(type==="category"){
        prompt=`You are Aldan Guru adaptive quiz AI for ${user.name} (${user.role}, ${user.hq}).\n\nCategory focus: ${target}\nFull product portfolio:\n${prodContext}\nUser weak products: ${weak}\n\nGenerate 5 MCQ questions ALL in the "${target}" category across different products. Distribute products — don't repeat same product twice. Start MEDIUM difficulty.\n\nReturn ONLY valid JSON array:\n[{"cat":"${target}","product":"product_id","q":"question in Hinglish","options":["A","B","C","D"],"correct":0,"explanation":"1-2 lines Hinglish","difficulty":"easy|medium|hard"}]`;
      }else{
        // mock — 10 questions, mixed
        prompt=`You are Aldan Guru adaptive quiz AI for ${user.name} (${user.role}, ${user.hq}).\n\nFull product portfolio:\n${prodContext}\nUser weak products in territory: ${weak}\n\nGenerate a 10-question FULL MOCK QUIZ. Mix all 8 categories evenly. Cover all products — no product more than twice. Start MEDIUM difficulty. Weight weak products (${weak}) at 40%.\n\nReturn ONLY valid JSON array:\n[{"cat":"type","product":"id","q":"question in Hinglish","options":["A","B","C","D"],"correct":0,"explanation":"1-2 lines Hinglish","difficulty":"easy|medium|hard"}]`;
      }

      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      const t=data.content?.[0]?.text||"";
      const parsed=JSON.parse(t.replace(/```json|```/g,"").trim());
      if(Array.isArray(parsed)&&parsed.length>0){
        setSession({questions:parsed,answers:[],score:0,done:false,type});
        setQi(0);setSel(null);setRev(false);
        if(type==="mock"){setTl(180);/* start timer in effect */}
      }
    }catch(e){console.error("Practice AI error",e);alert("AI connection error. Retry karo.");}
    setLoading(false);
  };

  // Adaptive: get next question prompt based on performance
  const getAdaptiveNext=async(questions,answers,nextIdx)=>{
    if(nextIdx>=questions.length)return null;
    // Check last 2 answers
    const recent=answers.slice(-2);
    const recentCorrect=recent.filter((a,i)=>a===questions[answers.length-2+i]?.correct).length;
    const perfSoFar=answers.filter((a,i)=>a===questions[i]?.correct).length/answers.length;
    // If scoring >80% last 2 — go harder. If <40% — go easier
    const currentDiff=questions[nextIdx]?.difficulty||"medium";
    let targetDiff=currentDiff;
    if(recent.length>=2){
      if(recentCorrect===2)targetDiff="hard";
      else if(recentCorrect===0)targetDiff="easy";
      else targetDiff="medium";
    }
    // If difficulty needs to change, regenerate that question
    if(targetDiff!==currentDiff&&questions.length>nextIdx){
      try{
        const pp=P.find(x=>x.id===questions[nextIdx]?.product);
        const prompt=`Generate 1 ${targetDiff} difficulty MCQ question about ${pp?.name||"any WomEm product"} in category "${questions[nextIdx]?.cat||"any"}". User is ${user.name}, ${user.role}. Previous score: ${Math.round(perfSoFar*100)}%.\n\nReturn ONLY valid JSON object (not array):\n{"cat":"type","product":"id","q":"Hinglish question","options":["A","B","C","D"],"correct":0,"explanation":"1-2 lines","difficulty":"${targetDiff}"}`;
        const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,messages:[{role:"user",content:prompt}]})});
        const data=await res.json();const t=data.content?.[0]?.text||"";
        const newQ=JSON.parse(t.replace(/```json|```/g,"").trim());
        if(newQ&&newQ.q){
          const updated=[...questions];updated[nextIdx]=newQ;
          setSession(s=>({...s,questions:updated}));
        }
      }catch(e){/* keep original */}
    }
    return targetDiff;
  };

  const pick=async(optIdx)=>{
    if(sel!==null)return;
    setSel(optIdx);setRev(true);
    const qs=session.questions;
    const na=[...session.answers,optIdx];
    const isCorrect=optIdx===qs[qi]?.correct;
    setTimeout(async()=>{
      if(qi<qs.length-1){
        // Adaptive: adjust next question
        await getAdaptiveNext(qs,na,qi+1);
        setQi(qi+1);setSel(null);setRev(false);
      }else{
        // Done
        clearInterval(tmr.current);
        const score=na.filter((a,i)=>a===qs[i]?.correct).length;
        const accuracy=Math.round(score/qs.length*100);
        // Save accuracy to Firebase
        const prodMap={};
        qs.forEach((q,i)=>{if(q.product){if(!prodMap[q.product])prodMap[q.product]={correct:0,total:0};prodMap[q.product].total++;if(na[i]===q.correct)prodMap[q.product].correct++;}});
        for(const [prod,stat] of Object.entries(prodMap)){
          await DB.ref(`${BASE}/practice_accuracy/${user.mobile}/${prod}`).transaction(cur=>{
            const prev=cur||{correct:0,total:0};
            return{correct:prev.correct+stat.correct,total:prev.total+stat.total};
          });
        }
        setSession(s=>({...s,answers:na,score,accuracy,done:true}));
      }
      setSession(s=>({...s,answers:na}));
    },1800);
  };

  // Mock timer
  useEffect(()=>{
    if(session?.type==="mock"&&!session?.done&&mode==="mock"){
      tmr.current=setInterval(()=>setTl(t=>{
        if(t<=1){clearInterval(tmr.current);const na=[...session.answers];for(let i=session.answers.length;i<session.questions.length;i++)na.push(-1);const score=na.filter((a,i)=>a===session.questions[i]?.correct).length;setSession(s=>({...s,answers:na,score,done:true}));return 0;}
        return t-1;
      }),1000);
      return()=>clearInterval(tmr.current);
    }
  },[session?.type,session?.done,mode]);

  // RESULTS screen
  if(session?.done){
    const {questions,answers,score,accuracy,type}=session;
    const catBreakdown={};
    questions.forEach((q,i)=>{if(!catBreakdown[q.cat])catBreakdown[q.cat]={c:0,t:0};catBreakdown[q.cat].t++;if(answers[i]===q.correct)catBreakdown[q.cat].c++;});
    return(
      <div className="px-4 pt-6 max-w-lg mx-auto pb-8">
        <div className="text-center mb-6">
          <div className="text-5xl mb-3 sr">{accuracy>=80?"🌟":accuracy>=60?"😊":"💪"}</div>
          <div className="serif text-xl text-white font-bold">Practice Complete!</div>
          <div className="text-4xl font-black mt-2 sr" style={{color:accuracy>=80?"#20BF6B":accuracy>=60?"#F7B731":"#FF6B35"}}>{score}/{questions.length}</div>
          <div className="text-sm mt-1" style={{color:"var(--sl)"}}>{accuracy}% accuracy · {type==="mock"?"Full Mock":"Drill"}</div>
          <div className="text-xs mt-1" style={{color:"#4a5568"}}>No points — practice mode</div>
        </div>
        {/* Category breakdown */}
        <div className="card p-4 mb-4">
          <div className="text-xs font-bold uppercase tracking-widest mb-3" style={{color:"var(--sl)"}}>Category Breakdown</div>
          {Object.entries(catBreakdown).map(([cat,{c,t}])=>(
            <div key={cat} className="mb-2">
              <div className="flex justify-between text-xs mb-1"><span style={{color:"var(--sl)"}}>{cat}</span><span style={{color:c/t>=0.7?"#20BF6B":c/t>=0.5?"#F7B731":"#EF4444"}}>{c}/{t}</span></div>
              <div className="w-full rounded-full h-1.5" style={{background:"rgba(255,255,255,0.06)"}}><div className="h-1.5 rounded-full" style={{width:`${Math.round(c/t*100)}%`,background:c/t>=0.7?"#20BF6B":c/t>=0.5?"#F7B731":"#EF4444"}}/></div>
            </div>
          ))}
        </div>
        {/* Question review */}
        <div className="space-y-3 mb-5">{questions.map((q,i)=>{const ir=answers[i]===q.correct;return(<div key={i} className="card p-4" style={{border:`1px solid ${ir?"rgba(32,191,107,0.3)":"rgba(239,68,68,0.3)"}`}}><div className="flex gap-2 mb-2"><span className="bdg text-xs" style={{background:"rgba(255,255,255,0.05)",color:"var(--sl)"}}>{q.cat}</span><span className="bdg text-xs" style={{background:"rgba(255,255,255,0.05)",color:"#4a5568"}}>{q.difficulty}</span></div><div className="text-sm text-white mb-2">{q.q}</div><div className={`text-xs font-semibold ${ir?"text-green-400":"text-red-400"}`}>{ir?"✅ Sahi!":` ❌ Sahi: "${q.options[q.correct]}"`}</div><div className="text-xs mt-1.5" style={{color:"var(--sl)"}}>{q.explanation}</div></div>);})}</div>
        <div className="flex gap-3">
          <button onClick={reset} className="btn-g flex-1">← Back to Practice</button>
          <button onClick={()=>startDrill(session.type,drillProd||drillCat)} className="btn-o flex-1">🔄 Again</button>
        </div>
      </div>
    );
  }

  // ACTIVE DRILL
  if(session&&!session.done){
    const qs=session.questions;const cq=qs[qi];if(!cq)return <Loading msg="Next question aa raha hai…"/>;
    const pp=P.find(x=>x.id===cq.product);
    const isMock=session.type==="mock";
    const tcol=tl>60?"#20BF6B":tl>30?"#F7B731":"#EF4444";
    const perfSoFar=session.answers.length>0?Math.round(session.answers.filter((a,i)=>a===qs[i]?.correct).length/session.answers.length*100):null;
    const diffColor=cq.difficulty==="hard"?"#EF4444":cq.difficulty==="medium"?"#F7B731":"#20BF6B";
    return(
      <div className="px-4 pt-6 max-w-lg mx-auto">
        <div className="flex items-center justify-between mb-4">
          <div>
            <div className="flex items-center gap-2">
              <button onClick={reset} className="text-xs" style={{color:"var(--sl)"}}>✕</button>
              <div className="text-xs uppercase tracking-widest font-bold" style={{color:"var(--sl)"}}>Q {qi+1}/{qs.length}</div>
              <span className="bdg text-xs" style={{background:`${diffColor}22`,color:diffColor}}>{cq.difficulty}</span>
            </div>
            <div className="flex gap-1 mt-1.5">{qs.map((_,i)=><div key={i} className="h-1 rounded-full w-5 transition-all" style={{background:i<qi?"#20BF6B":i===qi?"#FF6B35":"rgba(255,255,255,0.1)"}}/>)}</div>
          </div>
          <div className="text-right">
            {isMock&&<div className="text-sm font-black" style={{color:tcol}}>{Math.floor(tl/60)}:{String(tl%60).padStart(2,"0")}</div>}
            {perfSoFar!==null&&<div className="text-xs" style={{color:perfSoFar>=70?"#20BF6B":"#F7B731"}}>{perfSoFar}% so far</div>}
          </div>
        </div>
        <div className="flex gap-2 mb-3">
          <span className="bdg text-xs" style={{background:`${pp?.color||"#FF6B35"}22`,color:pp?.color||"#FF6B35"}}>{cq.cat}</span>
          {pp&&<span className="bdg text-xs" style={{background:"rgba(255,255,255,0.05)",color:"var(--sl)"}}>{pp.em} {pp.name}</span>}
        </div>
        <div className="card p-5 mb-4"><div className="text-white font-semibold text-base leading-relaxed">{cq.q}</div></div>
        <div className="space-y-3">{(cq.options||[]).map((opt,i)=>{let cls="qopt";if(rev){if(i===cq.correct)cls+=" ok";else if(i===sel&&i!==cq.correct)cls+=" no";}return(<button key={i} className={cls} onClick={()=>pick(i)} disabled={!!rev}><span className="mr-2 font-bold text-xs" style={{color:"var(--sl)"}}>{String.fromCharCode(65+i)}.</span>{opt}</button>);})}</div>
        {rev&&<div className={`mt-4 p-4 rounded-xl text-sm border fu ${sel===cq.correct?"text-green-200":"text-red-200"}`} style={{background:sel===cq.correct?"rgba(32,191,107,0.1)":"rgba(239,68,68,0.1)",borderColor:sel===cq.correct?"rgba(32,191,107,0.3)":"rgba(239,68,68,0.3)"}}><div className="font-bold mb-1">{sel===cq.correct?"✅ Sahi!":"❌ Galat"}</div>{cq.explanation}{cq.difficulty==="easy"&&sel!==cq.correct&&<div className="mt-1 text-xs opacity-70">Thoda mushkil karte hain agle mein 📈</div>}{cq.difficulty==="hard"&&sel===cq.correct&&<div className="mt-1 text-xs opacity-70">Excellent! Aap expert level pe hain 🌟</div>}</div>}
      </div>
    );
  }

  // Loading
  if(loading)return(<div className="min-h-screen flex flex-col items-center justify-center gap-4"><div className="text-4xl" style={{animation:"pulse 1s infinite"}}>🧠</div><div className="serif text-xl text-white">AI questions bana raha hai…</div><div className="text-sm mb-2" style={{color:"var(--sl)"}}>Adaptive difficulty set ho rahi hai</div><div className="flex gap-2">{[0,1,2].map(i=><div key={i} className="pdot w-2 h-2 rounded-full" style={{background:"var(--o)"}}/>)}</div></div>);

  // MODE SELECTION
  if(!mode)return(
    <div className="px-4 pt-6 max-w-lg mx-auto">
      <h2 className="serif text-xl text-white font-bold mb-1">🎯 Practice Mode</h2>
      <div className="text-sm mb-5" style={{color:"var(--sl)"}}>AI-powered · Adaptive difficulty · No leaderboard impact</div>
      <div className="space-y-3 mb-6">
        <div onClick={()=>setMode("product")} className="card p-5 cursor-pointer" style={{border:"1px solid rgba(255,107,53,0.2)"}}>
          <div className="flex items-center gap-4">
            <div className="w-12 h-12 rounded-2xl flex items-center justify-center text-2xl shrink-0" style={{background:"rgba(255,107,53,0.15)"}}>💊</div>
            <div><div className="font-bold text-white">Product Drill</div><div className="text-sm mt-0.5" style={{color:"var(--sl)"}}>Ek product chunno — 5 focused questions</div><div className="text-xs mt-1" style={{color:"var(--o)"}}>Adaptive difficulty · All 8 categories</div></div>
          </div>
        </div>
        <div onClick={()=>setMode("category")} className="card p-5 cursor-pointer" style={{border:"1px solid rgba(139,92,246,0.2)"}}>
          <div className="flex items-center gap-4">
            <div className="w-12 h-12 rounded-2xl flex items-center justify-center text-2xl shrink-0" style={{background:"rgba(139,92,246,0.15)"}}>📚</div>
            <div><div className="font-bold text-white">Category Drill</div><div className="text-sm mt-0.5" style={{color:"var(--sl)"}}>Ek category chunno — 5 questions across all products</div><div className="text-xs mt-1" style={{color:"#8B5CF6"}}>Skill-building mode</div></div>
          </div>
        </div>
        <div onClick={()=>{setMode("mock");startDrill("mock",null);}} className="card p-5 cursor-pointer" style={{border:"1px solid rgba(247,183,49,0.2)"}}>
          <div className="flex items-center gap-4">
            <div className="w-12 h-12 rounded-2xl flex items-center justify-center text-2xl shrink-0" style={{background:"rgba(247,183,49,0.15)"}}>🏆</div>
            <div><div className="font-bold text-white">Full Mock Quiz</div><div className="text-sm mt-0.5" style={{color:"var(--sl)"}}>10 questions · 3 minutes · Mixed products</div><div className="text-xs mt-1" style={{color:"#F7B731"}}>Complete assessment · Category report</div></div>
          </div>
        </div>
      </div>
      {weakProds.length>0&&<div className="card p-4 mb-4" style={{border:"1px solid rgba(255,107,53,0.2)"}}>
        <div className="text-xs font-bold uppercase tracking-widest mb-2" style={{color:"var(--o)"}}>💡 Suggested Focus</div>
        <div className="text-sm text-white">Territory mein weak products: {weakProds.map(w=>{const p=P.find(x=>PROD_RX_KEY[w]===x.id);return p?`${p.em} ${p.name}`:w;}).join(", ")}</div>
        <div className="text-xs mt-1" style={{color:"var(--sl)"}}>Inpe drill karo — sabse zyada improvement milegi</div>
      </div>}
    </div>
  );

  // PRODUCT SELECT
  if(mode==="product"&&!drillProd)return(
    <div className="px-4 pt-6 max-w-lg mx-auto">
      <button onClick={()=>setMode(null)} className="text-sm mb-4 flex items-center gap-1 hover:text-white" style={{color:"var(--sl)"}}>← Back</button>
      <h2 className="serif text-xl text-white font-bold mb-4">Kaun sa product?</h2>
      <div className="space-y-2">{P.map(pp=>(
        <div key={pp.id} onClick={()=>{setDrillProd(pp.id);startDrill("product",pp.id);}} className="card p-4 flex items-center gap-3 cursor-pointer" style={{border:"1px solid rgba(255,255,255,0.05)"}}>
          <div className="w-10 h-10 rounded-xl flex items-center justify-center text-xl shrink-0" style={{background:`${pp.color}22`}}>{pp.em}</div>
          <div className="flex-1"><div className="font-semibold text-white">{pp.name}</div><div className="text-xs" style={{color:"var(--sl)"}}>{pp.ind}</div></div>
          {weakProds.map(w=>PROD_RX_KEY[w]).includes(pp.id)&&<span className="bdg text-xs" style={{background:"rgba(255,107,53,0.15)",color:"var(--o)"}}>Weak 🎯</span>}
        </div>
      ))}</div>
    </div>
  );

  // CATEGORY SELECT
  if(mode==="category"&&!drillCat)return(
    <div className="px-4 pt-6 max-w-lg mx-auto">
      <button onClick={()=>setMode(null)} className="text-sm mb-4 flex items-center gap-1 hover:text-white" style={{color:"var(--sl)"}}>← Back</button>
      <h2 className="serif text-xl text-white font-bold mb-4">Kaun si category?</h2>
      <div className="space-y-2">{PRACTICE_CATS.map((cat,i)=>{const ems=["🧪","💰","⚙️","📚","💬","👁️","💪","⚖️"];return(
        <div key={cat} onClick={()=>{setDrillCat(cat);startDrill("category",cat);}} className="card p-4 flex items-center gap-3 cursor-pointer" style={{border:"1px solid rgba(255,255,255,0.05)"}}>
          <div className="w-10 h-10 rounded-xl flex items-center justify-center text-xl shrink-0" style={{background:"rgba(255,107,53,0.12)"}}>{ems[i]||"📝"}</div>
          <div><div className="font-semibold text-white">{cat}</div></div>
        </div>
      );})}
    </div>
  );

  return <Loading msg="Loading…"/>;
}

    DB.ref(`${BASE}/practice_accuracy`).once("value").then(s=>{setData(toObj(s.val()));setLoading(false);});

        <div className="space-y-3">{mbes.map(mbe=>{

          return(
            <div key={mbe.mobile} className="card p-4">
              <div className="font-semibold text-white text-sm mb-2">{mbe.name} <span className="text-xs ml-1" style={{color:"var(--sl)"}}>{mbe.hq}</span></div>
              <div className="space-y-1.5">{prods.sort((a,b)=>a[1].correct/a[1].total-b[1].correct/b[1].total).map(([prod,stat])=>{
                const pct=Math.round(stat.correct/stat.total*100);const pp=P.find(x=>x.id===prod);const c=pct>=70?"#20BF6B":pct>=50?"#F7B731":"#EF4444";
                return(<div key={prod}><div className="flex justify-between text-xs mb-0.5"><span style={{color:"var(--sl)"}}>{pp?.em} {pp?.name||prod}</span><span style={{color:c}} className="font-bold">{pct}% ({stat.total} Qs)</span></div><div className="w-full rounded-full h-1" style={{background:"rgba(255,255,255,0.05)"}}><div className="h-1 rounded-full" style={{width:`${pct}%`,background:c}}/></div></div>);
              })}</div>
            </div>
          );
        })}</div>
      )}
    </div>
  );
}

/* ══ ALDAN DOST ══ */
const DOST_SYSTEM=`You are Aldan Dost, the AI field companion for Aldan Healthcare WomEm Bihar field force. You are a mix of a warm senior colleague (15 years field experience) and a sharp clinical expert.

CORE PERSONA — ADAPTIVE:
- Start every conversation in FRIENDLY mode: casual Hinglish, call them by first name, use "yaar", "bhai", "arre" naturally
- If they give short/wrong answers or seem confused → shift to COACH mode: encouraging, more explanatory, use analogies
- If they engage well, ask follow-up questions, or request clinical depth → shift to EXPERT mode: precise, cite journals, structured responses
- NEVER stay stuck in one mode — read the conversation and adapt every 2-3 messages
- Always end responses with either a follow-up question OR a practical field tip

KNOWLEDGE BASE:
Products: Ovalux (egg quality, IVF — CoQ10+DHEA+Melatonin+L-Arg, MRP Rs.1219), Lacoria (BV/leucorrhoea — 5 strains, MRP Rs.432), Myolife Plus (obese PCOS — 40:1 MI:DCI, MRP Rs.329), Aldova (OI — CC+NAC+Astaxanthin, MRP Rs.637), Argilux (pregnancy/IUGR — L-Arg 3g+DHA, MRP Rs.979), Myolife (lean PCOS, MRP Rs.254), LOQ-10 Plus (male infertility, MRP Rs.516), Utilac (recurrent UTI, MRP Rs.320), Myo-GDM (GDM — MI 2000mg, MRP Rs.311), Osteofem (bone/non-hormonal, MRP Rs.463), Aldanvit (multivitamin/prevention, MRP Rs.160)

Key journals: J Ovarian Research 2025 (Ovalux DHEA 16 RCTs), Int J Womens Health 2024 (Lacoria 62% BV reduction), Endocrine 2024 (Myolife Plus 40:1), Fertil Steril 2024 (Aldova NAC 35%), AJOG 2024 (Argilux IUGR 45%), Diabetes Care 2024 (Myo-GDM 60%), Cochrane 2023 (Utilac 38%)

ROLE PLAY: When asked for role play — you play a realistic Indian gynecologist/doctor. Be skeptical, ask real objections, reference real competitor products (Inofolic, Metrogyl, Letrozole), push back on price. Don't make it too easy. After 3-4 exchanges, break character and give feedback on how the rep did.

TERRITORY AWARENESS: You know each MBE's weak products and territory. Use this to make questions and tips territory-specific.

FORMAT: Keep responses concise for mobile (max 4-5 lines). Use line breaks. Bold key terms with *asterisks* style in plain text. Hinglish default — switch to more Hindi when being casual, more English when being clinical.`;

function AldanDost({user,weakProds}){
  const [msgs,setMsgs]=useState([]);const [input,setInput]=useState("");const [typing,setTyping]=useState(false);const [toneLevel,setToneLevel]=useState(50); // 0=yaar, 50=balanced, 100=expert
  const [showExamples,setShowExamples]=useState(true);
  const inputRef=useRef();const bottomRef=useRef();

  const firstMsg=useRef(false);
  useEffect(()=>{
    if(!firstMsg.current){
      firstMsg.current=true;
      const fn=user.name.split(" ")[0];
      const weak=weakProds.map(w=>{const p=P.find(pp=>PROD_RX_KEY[w]===pp.id);return p?p.name:w;});
      const greeting=`Arre ${fn}! Kya scene hai aaj? 👋

Main Aldan Dost hoon — product doubt ho, doctor objection ho, ya sirf revision karna ho — sab ke liye ready hoon.

${weak.length>0?`Dekha hai ${weak[0]} territory mein thoda weak hai — agar chaaho toh wahan se shuru karte hain? 🎯`:"Kya discuss karna hai aaj?"}`;
      setMsgs([{role:"assistant",content:greeting,ts:new Date().toISOString()}]);
    }
  },[]);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});}, [msgs]);

  const send=async(text)=>{
    const userText=text||input.trim();
    if(!userText)return;
    setInput("");setShowExamples(false);
    const newMsgs=[...msgs,{role:"user",content:userText,ts:new Date().toISOString()}];
    setMsgs(newMsgs);setTyping(true);
    try{
      const weak=weakProds.map(w=>{const p=P.find(pp=>PROD_RX_KEY[w]===pp.id);return p?p.name:w;}).join(", ")||"none";
      const sysWithContext=DOST_SYSTEM+`

Current user: ${user.name}, Role: ${user.role}, HQ: ${user.hq}
Weak products in territory: ${weak}
Current tone level: ${toneLevel<33?"FRIENDLY/YAAR":toneLevel<66?"BALANCED":"EXPERT"} — adjust based on conversation quality.`;
      const apiMsgs=newMsgs.map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.content}));
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,system:sysWithContext,messages:apiMsgs})});
      const data=await res.json();
      const reply=data.content?.[0]?.text||"Kuch error aa gaya. Dobara try karo!";
      // Adaptive tone detection from reply
      const isExpert=reply.includes("RCT")||reply.includes("Journal")||reply.includes("mechanism")||reply.includes("meta-analysis");
      const isCasual=reply.includes("yaar")||reply.includes("bhai")||reply.includes("arre")||reply.includes("chal");
      setToneLevel(prev=>{
        if(isExpert)return Math.min(100,prev+15);
        if(isCasual)return Math.max(0,prev-10);
        return prev;
      });
      setMsgs([...newMsgs,{role:"assistant",content:reply,ts:new Date().toISOString()}]);
    }catch(e){setMsgs([...newMsgs,{role:"assistant",content:"Connection error — internet check karo aur retry karo.",ts:new Date().toISOString()}]);}
    setTyping(false);
    inputRef.current?.focus();
  };

  const toneLabel=toneLevel<33?"🤝 Yaar Mode":toneLevel<66?"📚 Balanced":"🔬 Expert Mode";
  const toneColor=toneLevel<33?"#3B82F6":toneLevel<66?"#FF6B35":"#F7B731";

  return(
    <div className="flex flex-col" style={{height:"calc(100vh - 100px)"}}>
      {/* Header */}
      <div className="px-4 pt-4 pb-3 flex items-center gap-3" style={{borderBottom:"1px solid var(--bd)"}}>
        <div className="relative">
          <DostAvatar size={44}/>
          <div className="absolute bottom-0 right-0 w-3 h-3 rounded-full border-2" style={{background:"#20BF6B",borderColor:"var(--navy)"}}/>
        </div>
        <div className="flex-1">
          <div className="font-bold text-white text-sm">Aldan Dost 🤝</div>
          <div className="text-xs font-semibold" style={{color:"#20BF6B"}}>● Online — Aapke liye ready</div>
        </div>
        <div className="text-right">
          <div className="text-xs font-bold" style={{color:toneColor}}>{toneLabel}</div>
          <div className="w-20 h-1 rounded-full mt-1" style={{background:"rgba(255,255,255,0.08)"}}>
            <div className="h-1 rounded-full transition-all" style={{width:`${toneLevel}%`,background:`linear-gradient(90deg,#3B82F6,${toneColor})`}}/>
          </div>
        </div>
      </div>

      {/* Messages */}
      <div className="flex-1 overflow-y-auto px-4 py-3 space-y-3">
        {msgs.map((m,i)=>(
          <div key={i} className={`flex ${m.role==="user"?"justify-end":"justify-start"} gap-2`}>
            {m.role==="assistant"&&<div className="shrink-0 mt-1"><DostAvatar size={28}/></div>}
            <div className="max-w-xs">
              <div className="px-4 py-2.5 rounded-2xl text-sm leading-relaxed whitespace-pre-line" style={m.role==="assistant"?{background:"linear-gradient(135deg,rgba(255,107,53,0.12),rgba(247,183,49,0.08))",border:"1px solid rgba(255,107,53,0.2)",color:"var(--wh)",borderRadius:"4px 16px 16px 16px"}:{background:"rgba(255,255,255,0.07)",color:"var(--sll)",borderRadius:"16px 16px 4px 16px"}}>
                {m.content}
              </div>
            </div>
          </div>
        ))}
        {typing&&(
          <div className="flex gap-2 items-end">
            <div className="shrink-0"><DostAvatar size={28}/></div>
            <div className="px-4 py-3 rounded-2xl flex gap-1.5" style={{background:"rgba(255,107,53,0.1)",border:"1px solid rgba(255,107,53,0.15)",borderRadius:"4px 16px 16px 16px"}}>
              {[0,1,2].map(i=><div key={i} className="w-2 h-2 rounded-full" style={{background:"#FF6B35",animation:`pd 1.2s ease-in-out infinite ${i*0.2}s`}}/>)}
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      {/* Examples */}
      {showExamples&&msgs.length<=1&&(
        <div className="px-4 pb-2">
          <div className="text-xs font-bold uppercase tracking-widest mb-2" style={{color:"#4a5568"}}>Kuch ideas — yeh try karo:</div>
          <div className="flex gap-2 overflow-x-auto pb-1">
            {DOST_EXAMPLES.slice(0,5).map((ex,i)=>(
              <button key={i} onClick={()=>send(ex.q)} className="shrink-0 px-3 py-2 rounded-xl text-xs text-left" style={{background:"rgba(255,107,53,0.08)",border:"1px solid rgba(255,107,53,0.2)",color:"var(--sll)",maxWidth:"180px"}}>
                <div className="text-base mb-1">{ex.em}</div>
                <div className="leading-tight">{ex.q.slice(0,50)}…</div>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* All examples toggle */}
      {showExamples&&msgs.length<=1&&(
        <div className="px-4 pb-2">
          <button onClick={()=>setShowExamples(false)} className="text-xs" style={{color:"#4a5568"}}>Hide suggestions</button>
        </div>
      )}
      {!showExamples&&msgs.length>1&&(
        <div className="px-4 pb-1">
          <button onClick={()=>setShowExamples(true)} className="text-xs" style={{color:"#4a5568"}}>💡 Show example prompts</button>
        </div>
      )}

      {/* Examples full list */}
      {showExamples&&msgs.length>1&&(
        <div className="px-4 pb-2 max-h-40 overflow-y-auto">
          <div className="text-xs font-bold uppercase tracking-widest mb-2" style={{color:"#4a5568"}}>15 Things You Can Ask:</div>
          <div className="space-y-1.5">{DOST_EXAMPLES.map((ex,i)=>(
            <button key={i} onClick={()=>send(ex.q)} className="w-full text-left px-3 py-2 rounded-lg text-xs flex gap-2" style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(143,163,191,0.1)",color:"var(--sll)"}}>
              <span style={{color:"var(--o)",minWidth:"16px"}}>{i+1}.</span>
              <span className="leading-tight">{ex.q}</span>
            </button>
          ))}</div>
        </div>
      )}

      {/* Input */}
      <div className="px-4 pb-4 pt-2" style={{borderTop:"1px solid var(--bd)"}}>
        <div className="flex gap-2 items-end">
          <textarea ref={inputRef} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Kuch bhi pucho — product, objection, role play…" rows={2} className="flex-1 rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none resize-none" style={{background:"rgba(255,255,255,0.05)",border:"1px solid var(--bd)"}}/>
          <button onClick={()=>send()} disabled={!input.trim()||typing} className="w-10 h-10 rounded-xl flex items-center justify-center shrink-0 disabled:opacity-30 transition-all" style={{background:input.trim()?"var(--o)":"rgba(255,255,255,0.05)"}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
