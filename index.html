.flame{animation:flicker 1.2s ease-in-out infinite alternate;display:inline-block;}
@keyframes flicker{0%{transform:scaleY(1) rotate(-1deg);}100%{transform:scaleY(1.05) rotate(1deg);}}
.timer-ring{transition:stroke-dashoffset 1s linear;}
.cv{animation:cvin 0.25s ease;}
@keyframes cvin{from{opacity:0;transform:translateX(18px);}to{opacity:1;transform:translateX(0);}}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px;}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,27,42,0.96);backdrop-filter:blur(20px);border-top:1px solid var(--bd);padding:8px 0 env(safe-area-inset-bottom,8px);z-index:50;}

.ni.on{color:var(--o);}
.ni .ic{font-size:19px;transition:transform 0.2s;}
.ni.on .ic{transform:scale(1.15);}
.bdg{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;}

.sr{animation:srv 0.5s cubic-bezier(0.34,1.56,0.64,1);}

.fu{animation:fu 0.4s ease forwards;}

    let c = 5;

        clearInterval(cdRef.current);

      const d = await res.json();
      const newQ = JSON.parse(((d.content && d.content[0] && d.content[0].text) || "").replace(/```json|```/g,"").trim());
      if (newQ && newQ.q) {
        const upd = qs.slice();

    // Header

      React.createElement("div", {className:"text-xs font-bold uppercase tracking-widest", style:{color:"var(--sl)"}},
        "Q " + (qi+1) + "/" + qs.length
      ),
      React.createElement("div", {className:"flex items-center gap-2"},
        React.createElement("span", {
          className:"text-xs px-2 py-1 rounded-full font-bold",
          style:{
            background: cq.difficulty==="hard" ? "rgba(239,68,68,0.15)" : cq.difficulty==="easy" ? "rgba(32,191,107,0.15)" : "rgba(255,183,49,0.15)",
            color: cq.difficulty==="hard" ? "#EF4444" : cq.difficulty==="easy" ? "#20BF6B" : "#F7B731"
          }
        }, cq.difficulty),
        sel !== null && React.createElement("span", {className:"text-xs font-bold", style:{color:"var(--o)"}},
          countdown + "s"
        )
      )
    ),
    // Progress bar
    React.createElement("div", {className:"w-full rounded-full h-1.5 mb-5", style:{background:"rgba(255,255,255,0.08)"}},
      React.createElement("div", {

      })
    ),
    // Category tag

      cq.cat
    ),
    // Question
    React.createElement("div", {

    // Options
    React.createElement("div", {className:"space-y-2.5 mb-4"},

        var base = "w-full text-left px-4 py-3.5 rounded-xl text-sm font-semibold transition-all border ";
        var style = {};
